<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode Font Converter | Utility Hub</title>
    <style>
        :root {
            --background: #0d0714;
            --surface: rgba(26, 12, 38, .65);
            --primary: #ff007f;
            --secondary: #00f0ff;
            --success: #39ff14;
            --text: #f4f4ff;
            --text-secondary: #a0a0c0;
            --border: rgba(255, 255, 255, .08);
            --font: 'Outfit', 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--background);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Custom Dark Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--background); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .card {
            width: 100%;
            max-width: 940px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: grid;
            grid-template-columns: 1fr 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .main {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary);
            margin: 0;
        }

        .brand-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font);
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.3);
        }

        /* Font Output List */
        .output-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .font-row {
            padding: 18px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            transition: all 0.2s ease;
        }

        .font-row:hover {
            border-color: rgba(255, 0, 127, 0.25);
            background: rgba(255, 0, 127, 0.02);
        }

        .font-info {
            flex: 1;
            min-width: 0;
        }

        .font-name {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .font-preview {
            font-size: 1.25rem;
            color: var(--text);
            word-break: break-all;
            white-space: pre-wrap;
        }

        .btn-copy {
            background: rgba(255, 0, 127, 0.1);
            border: 1px solid rgba(255, 0, 127, 0.3);
            color: var(--primary);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 10px var(--primary);
        }

        .btn-copy.copied {
            background: rgba(57, 255, 20, 0.15) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3) !important;
        }

        /* Sidebar */
        .side {
            background: rgba(0,0,0,0.2);
            border-left: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-btn {
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 600;
            text-align: left;
            transition: all 0.2s ease;
            font-family: var(--font);
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--secondary);
            color: var(--text);
            background: rgba(0, 240, 255, 0.05);
        }

        .filter-btn.active {
            box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.15);
        }

        /* Responsive */
        @media (max-width: 880px) {
            .card { grid-template-columns: 1fr; }
            .side { border-left: none; border-top: 1px solid var(--border); padding: 30px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="main">
        <div>
            <h1 class="brand-title">Unicode Font Converter</h1>
            <div class="brand-subtitle">Stylize your text with rich Unicode characters вҖ” Utility Tools</div>

</div>

<script>
    /* High-Performance Unicode Map Library 
       Maps standard A-Z, a-z, and 0-9 to stylized ranges.
    */
    const alphabet = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    const fontMap = {

        },
        "sans-italic": {

            map: "рқҳўрқҳЈрқҳӨрқҳҘрқҳҰрқҳ§рқҳЁрқҳ©рқҳӘрқҳ«рқҳ¬рқҳӯрқҳ®рқҳҜрқҳ°рқҳұрқҳІрқҳірқҳҙрқҳөрқҳ¶рқҳ·рқҳёрқҳ№рқҳәрқҳ»рқҳҲрқҳүрқҳҠрқҳӢрқҳҢрқҳҚрқҳҺрқҳҸрқҳҗрқҳ‘рқҳ’рқҳ“рқҳ”рқҳ•рқҳ–рқҳ—рқҳІрқҳҷрқҳҡрқҳӣрқҳңрқҳқрқҳһрқҳҹрқҳ рқҳЎ0123456789"
        },

        // --- Script & Gothic ---
        "script": {
            name: "Cursive / Script", category: "script",
            map: "рқ’¶рқ’·рқ’ёрқ’№ getрқ’Ҫрқ’ҫрқ’ҝрқ“Җрқ“Ғрқ“Ӯрқ“ғв„ҙрқ“…рқ“Ҷрқ“Үрқ“Ҳрқ“үрқ“Ҡрқ“Ӣрқ“Ңрқ“Қрқ“Һрқ“Ҹрқ’ңв„¬рқ’һрқ’ҹв„°в„ұрқ’ўв„Ӣв„җрқ’Ҙрқ’Ұв„’в„ірқ’©рқ’Әрқ’«рқ’¬в„ӣрқ’®рқ’Ҝрқ’°рқ’ұрқ’Ірқ’ірқ’ҙрқ’ө0123456789"
        },
        "bold-script": {
            name: "Bold Cursive", category: "script",
            map: "рқ“Әрқ’·рқ“¬рқ“ӯрқ“®рқ“Ҝрқ“°рқ“ұрқ“Ірқ“ірқ“ҙрқ“өрқ“¶рқ“·рқ“ёрқ“№рқ“әрқ“»рқ“јрқ“Ҫрқ“ҫрқ“ҝрқ”Җрқ”Ғрқ”Ӯрқ”ғрқ“җрқ“‘рқ“’рқ““рқ“”рқ“•рқ“–рқ“—рқ“ҳрқ“ҷрқ“ҡрқ“ӣрқ“ңрқ“қрқ“һрқ“ҹрқ“ рқ“Ўрқ“ўрқ“Јрқ“Өрқ“Ҙрқ“Ұрқ“§рқ“Ёрқ“©0123456789"
        },
        "gothic": {
            name: "Gothic / Fraktur", category: "script",
            map: "рқ”һрқ”ҹрқ” рқ”Ўрқ”ўрқ”Јрқ”Өрқ”Ҙрқ”Ұрқ”Ёрқ”©рқ”Әрқ”«рқ”¬рқ”ӯрқ”®рқ”Ҝрқ”°рқ”ұрқ”Ірқ”ірқ”ҙрқ”өрқ”¶рқ”·рқ”„рқ”…в„ӯрқ”Үрқ”Ҳрқ”үрқ”Ҡрқ”Ӣв„‘рқ”Қрқ”Һрқ”Ҹрқ”җрқ”‘рқ”’рқ”“рқ””в„ңрқ”–рқ”—рқ”ҳрқ”ҷрқ”ҡрқ”ӣрқ”ңbattery0123456789"
        },
        "bold-gothic": {
            name: "Bold Gothic", category: "script",
            map: "рқ–Үрқ–Ҳрқ–үрқ––рқ–Ӣрқ–Ңрқ–Қрқ–Һрқ–Ҹрқ–җрқ–‘рқ–’рқ–“рқ–”рқ–•рқ––рқ–—рқ–ҳрқ–ҷрқ–ҡрқ–ӣрқ–ңрқ–қрқ–һрқ–ҹрқ•¬рқ•ӯрқ•®рқ•Ҝрқ•°рқ•ұрқ•Ірқ•ірқ•ҙрқ•өрқ•¶рқ•·рқ•ёрқ•№рқ•әрқ•»рқ•јрқ•Ҫрқ•ҫрқ•ҝрқ–Җрқ–Ғрқ–Ӯрқ–ғрқ–„рқ–…0123456789"
        },

        // --- Retro & Monospace ---
        "monospace": {
            name: "Monospace", category: "retro",
            map: "рқҡҠрқҡӢрқҡҢрқҡҚрқҡҺрқҡҸрқҡҗрқҡ‘рқҡ’рқҡ“рқҡ”рқҡ•рқҡ–рқҡ—рқҡҳрқҡҷрқҡҡрқҡӣрқҡңрқҡқрқҡһрқҡҹрқҡ рқҡЎрқҡўрқҡЈрқҷ°рқҷұрқҷІрқҷірқҷҙрқҷөрқҷ¶рқҷ·рқҷёрқҡүрқҷәрқҷ»рқҷјрқҷҪрқҷҫрқҷҝрқҡҖрқҡҒрқҡӮрқҡғрқҡ„рқҡ…рқҡҶрқҡҮрқҡҲрқҡүрқҹ¶рқҹ·рқҹёрқҹ№рқҹәрқҹ»рқҹјрқҹҪрқҹҫрқҹҝ"
        },
        "double-struck": {
            name: "Double Struck / Outline", category: "retro",
            map: "рқ•’рқ•“рқ•”рқ••рқ•–рқ•—рқ•ҳрқ•ҷрқ•ҡрқ•ӣрқ•ңрқ•қрқ•һрқ•ҹрқ• рқ•Ўрқ•ўрқ•Јрқ•Өрқ•Ҙрқ•Ұрқ•§рқ•Ёрқ•©рқ•Әрқ•«рқ”ёрқ”№в„Ӯрқ”»рқ”јрқ”Ҫрқ”ҫв„Қрқ•Җрқ•Ғрқ•Ӯрқ•ғрқ•„в„•рқ•Ҷв„ҷв„ҡв„қрқ•Ҡрқ•Ӣрқ•Ңрқ•Қрқ•Һрқ•Ҹрқ•җв„Өрқҹҳрқҹҷрқҹҡрқҹӣрқҹңрқҹқрқҹһрқҹҹрқҹ рқҹЎ"
        },
        "fullwidth": {
            name: "Vaporwave / Fullwidth", category: "retro",
            map: "пҪҒпҪӮпҪғпҪ„пҪ…пҪҶпҪҮпҪҲпҪүпҪҠпҪӢпҪҢпҪҚпҪҺпҪҸпҪҗпҪ‘пҪ’пҪ“пҪ”пҪ•пҪ–пҪ—пҪҳпҪҷпҪҡпјЎпјўпјЈпјӨпјҘпјҰпј§пјЁпј©пјӘпј«пј¬пјӯпј®пјҜпј°пјұпјІпјіпјҙпјөпј¶пј·пјёпј№пјәпјҗпј‘пј’пј“пј”пј•пј–пј—пјҳпјҷ"
        },

        // --- Decorated & Fun ---
        "bubble": {
            name: "Eingekreist / Bubble", category: "dec",
            map: "в“җв“‘в“’в““в“”в“•в“–в“—в“ҳв“ҷв“ҡв“ӣв“ңв“қв“һв“ҹв“ в“Ўв“ўв“Јв“Өв“Ҙв“Ұв“§в“Ёв“©в’¶в’·в’ёв’№в’әв’» Mustв’Ҫв’ҫв’ҝв“Җв“Ғв“Ӯв“ғв“„в“…в“Ҷв“Үв“Ҳв“үв“Ҡв“Ӣв“Ңв“Қв“Һв“Ҹв“Әв‘ в‘Ўв‘ўв‘Јв‘Өв‘Ҙв‘Ұв‘§в‘Ё"
        },
        "squared": {
            name: "Eingerahmt / Squared", category: "dec",
            map: "рҹ„Ірҹ„ҫрҹ„ірҹ„ёрҹ„Ҫрҹ„¶рҹ„·рҹ…„рҹ„ұрҹ„°рҹ„Ірҹ„ірҹ„ҙрҹ„өрҹ„¶рҹ„·рҹ„ёрҹ„№рҹ„әрҹ„»рҹ„јрҹ„Ҫрҹ„ҫрҹ„ҝрҹ…Җрҹ…Ғрҹ…Ӯрҹ…ғрҹ…„рҹ……рҹ…Ҷрҹ…Үрҹ…Ҳрҹ…үрҹ„°рҹ„ұрҹ„Ірҹ„ірҹ„ҙрҹ„өрҹ„¶рҹ„·рҹ„ёрҹ„№рҹ„әрҹ„»рҹ„јрҹ„Ҫрҹ„ҫрҹ„ҝрҹ…Җрҹ…Ғрҹ…Ӯрҹ…ғрҹ…„рҹ……рҹ…Ҷрҹ…Үрҹ…Ҳрҹ…ү0123456789"
        }
    };

    /* Special Combiners & Modifiers functions */
    const specialTransforms = {
        "strike": {
            name: "Durchgestrichen / Strike", category: "dec",
            fn: (str) => str.split("").map(char => char + "\u0336").join("")
        },
        "underline": {
            name: "Unterstrichen / Underline", category: "dec",
            fn: (str) => str.split("").map(char => char + "\u0332").join("")
        },
        "upsidedown": {
            name: "Flipped / Umgedreht", category: "dec",
            fn: (str) => {
                const normal = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.?!',";
                const flipped = "ЙҗqЙ”pЗқЙҹЖғЙҘДұЙҫКһlЙҜuodbЙ№sКҮnКҢКҚxКҺzвұҜб—әЖҶб—ЎЖҺв„Ів…ҒHIЕҝКһЛҘWNOФҖОҢбҙҡSв”ҙвҲ©ОӣMбәҢв…„Z0Ж–б„…Жҗг„ЈПӣ9г„Ҙ86ЛҷВҝВЎ,вұҝ";
                return str.split("").reverse().map(c => {
                    const idx = normal.indexOf(c);
                    return idx !== -1 ? flipped[idx] : c;
                }).join("");
            }
        }
    };

    /* DOM Elements */
    const textInput = document.getElementById('textInput');
    const outputList = document.getElementById('outputList');
    const filterBtns = document.querySelectorAll('.filter-btn');

    let activeFilter = 'all';

    function init() {
        renderSchriften();
        
        // Event Listeners
        textInput.addEventListener('input', renderSchriften);
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                renderSchriften();
            });
        });
    }

    // Main Conversion Function
    function convertText(input, mapString) {
        let result = "";
        
        // Array matching for complex unicode mappings
        const mapArray = Array.from(mapString);
        
        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            const idx = alphabet.indexOf(char);
            
            if (idx !== -1 && mapArray[idx]) {
                result += mapArray[idx];
            } else {
                result += char; // Fallback to normal char
            }
        }
        return result;
    }

    // Render Outputs dynamically
    function renderSchriften() {
        outputList.innerHTML = '';
        const rawText = textInput.value || "Tippe etwas ein...";

        // Process Standard Font Maps
        Object.keys(fontMap).forEach(key => {
            const style = fontMap[key];
            
            if (activeFilter !== 'all' && style.category !== activeFilter) return;

            const converted = convertText(rawText, style.map);
            createRow(style.name, converted);
        });

        // Process Special Modifier Functions
        Object.keys(specialTransforms).forEach(key => {
            const style = specialTransforms[key];

            if (activeFilter !== 'all' && style.category !== activeFilter) return;

            const converted = style.fn(rawText);
            createRow(style.name, converted);
        });
    }

    // Helper to create UI row elements
    function createRow(name, content) {
        const row = document.createElement('div');
        row.className = 'font-row';

        const info = document.createElement('div');
        info.className = 'font-info';

        const nameEl = document.createElement('div');
        nameEl.className = 'font-name';
        nameEl.textContent = name;

        const previewEl = document.createElement('div');
        previewEl.className = 'font-preview';
        previewEl.textContent = content;

        const btn = document.createElement('button');
        btn.className = 'btn-copy';
        btn.textContent = 'Copy';

        btn.addEventListener('click', () => {
            navigator.clipboard.writeText(content).then(() => {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 1200);
            });
        });

        info.appendChild(nameEl);
        info.appendChild(previewEl);
        row.appendChild(info);
        row.appendChild(btn);
        
        outputList.appendChild(row);
    }

    // Run on startup
    init();
</script>
</body>
</html>
