<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode Font Converter | Utility Tools</title>
    <style>
        :root {
            --background: #0d0714;
            --surface: rgba(26, 12, 38, .65);
            --primary: #ff007f;
            --secondary: #00f0ff;
            --success: #39ff14;
            --text: #f4f4ff;
            --text-secondary: #a0a0c0;
            --border: rgba(255, 255, 255, .08);
            --font: 'Outfit', 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--background);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents body from scrolling */
            box-sizing: border-box;
        }

        /* Custom Dark Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--background); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .card {
            width: 100%;
            max-width: 940px;
            height: 85vh;
            max-height: 700px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: grid;
            grid-template-columns: 1fr 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden; /* Card structure stays fully static */
        }

        .main {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0; /* Vital for nested flex scrolling in Chrome */
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary);
            margin: 0;
        }

        .brand-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 14px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font);
            font-size: 1.1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.3);
        }

        .output-section {
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1;
        }

        /* Font Output List - The ONLY scrollable element */
        .output-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            flex: 1;
            padding-right: 8px;
        }

        .font-row {
            padding: 16px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            transition: all 0.2s ease;
        }

        .font-row:hover {
            border-color: rgba(255, 0, 127, 0.25);
            background: rgba(255, 0, 127, 0.02);
        }

        .font-info {
            flex: 1;
            min-width: 0;
        }

        .font-name {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .font-preview {
            font-size: 1.2rem;
            color: var(--text);
            word-break: break-all;
            white-space: pre-wrap;
        }

        .btn-copy {
            background: rgba(255, 0, 127, 0.1);
            border: 1px solid rgba(255, 0, 127, 0.3);
            color: var(--primary);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 10px var(--primary);
        }

        .btn-copy.copied {
            background: rgba(57, 255, 20, 0.15) !important;
            border-color: var(--success) !important;
            color: var(--success) !important;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3) !important;
        }

        /* Sidebar */
        .side {
            background: rgba(0,0,0,0.2);
            border-left: 1px solid var(--border);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 20px;
        }

        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-btn {
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 600;
            text-align: left;
            transition: all 0.2s ease;
            font-family: var(--font);
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--secondary);
            color: var(--text);
            background: rgba(0, 240, 255, 0.05);
        }

        .filter-btn.active {
            box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.15);
        }

        /* Responsive */
        @media (max-width: 880px) {
            body { height: auto; overflow: auto; }
            .card { grid-template-columns: 1fr; height: auto; max-height: none; }
            .side { border-left: none; border-top: 1px solid var(--border); padding: 30px; }
            .output-container { max-height: 400px; }
        }
    </style>
</head>

    </div>
</div>

        "diamond-frame": {
            name: "Diamond Frame", category: "dec",
            fn: (str) => `◈ ${str || "Diamond Frame"} ◈`
        },
        "reversed": {
            name: "Reversed Mirror", category: "retro",
            fn: (str) => {
                const normal = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
                const flipped = "ɒdɔbɘᎸgʜiႱʞlmnoqpɿꙅƚυvwxγƹɒdɔbɘᎸgʜiႱʞlmnoqpɿꙅƚυvwxγƹ0123456789";
                return str.split("").map(c => {
                    const idx = normal.indexOf(c);
                    return idx !== -1 ? flipped[idx] : c;
                }).join("");
            }
        },
        "upsidedown": {
            name: "Upside Down", category: "dec",
            fn: (str) => {
                const normal = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.?!',";
                const flipped = "ɐqɔpǝɟƃɥıɾʞlɯuodbɹsʇnʌʍxʎzⱯᗺƆᗡƎℲ⅁HIſʞ˥WNOԀΌᴚS┴∩ΛMẌ⅄Z0ƖᄅƐㄣϛ9ㄥ86˙¿¡,Ɀ";
                return str.split("").reverse().map(c => {
                    const idx = normal.indexOf(c);
                    return idx !== -1 ? flipped[idx] : c;
                }).join("");
            }
        }
    };

    /* DOM Elements */
    const textInput = document.getElementById('textInput');
    const outputList = document.getElementById('outputList');
    const filterBtns = document.querySelectorAll('.filter-btn');

    let activeFilter = 'all';

    function init() {
        renderFonts();
        
        // Event Listeners
        textInput.addEventListener('input', renderFonts);
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                renderFonts();
            });
        });
    }

    // Convert standard text with standard Unicode ranges
    function convertText(input, mapString) {
        let result = "";
        const mapArray = Array.from(mapString);
        
        for (let i = 0; i < input.length; i++) {
            const char = input[i];
            const idx = alphabet.indexOf(char);
            
            if (idx !== -1 && mapArray[idx]) {
                result += mapArray[idx];
            } else {
                result += char;
            }
        }
        return result;
    }

    // Render lists on the screen
    function renderFonts() {
        outputList.innerHTML = '';
        const rawText = textInput.value; // Starts as empty

        // 1. Process Standard Maps
        Object.keys(fontMap).forEach(key => {
            const style = fontMap[key];
            if (activeFilter !== 'all' && style.category !== activeFilter) return;

            // If text input is empty, convert the Font's Name itself as a preview
            const textToConvert = rawText !== "" ? rawText : style.name;
            const converted = convertText(textToConvert, style.map);
            createRow(style.name, converted);
        });

        // 2. Process Special Modifiers
        Object.keys(specialTransforms).forEach(key => {
            const style = specialTransforms[key];
            if (activeFilter !== 'all' && style.category !== activeFilter) return;

            // If text input is empty, pass the Font's Name itself as a preview
            const textToConvert = rawText !== "" ? rawText : style.name;
            const converted = style.fn(textToConvert);
            createRow(style.name, converted);
        });
    }

    // Create single rows inside the scrolling view
    function createRow(name, content) {
        const row = document.createElement('div');
        row.className = 'font-row';

        const info = document.createElement('div');
        info.className = 'font-info';

        const nameEl = document.createElement('div');
        nameEl.className = 'font-name';
        nameEl.textContent = name;

        const previewEl = document.createElement('div');
        previewEl.className = 'font-preview';
        previewEl.textContent = content;

        const btn = document.createElement('button');
        btn.className = 'btn-copy';
        btn.textContent = 'Copy';

        btn.addEventListener('click', () => {
            navigator.clipboard.writeText(content).then(() => {
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 1200);
            });
        });

        info.appendChild(nameEl);
        info.appendChild(previewEl);
        row.appendChild(info);
        row.appendChild(btn);
        
        outputList.appendChild(row);
    }

    // Initialize application
    init();
</script>
</body>
</html>
