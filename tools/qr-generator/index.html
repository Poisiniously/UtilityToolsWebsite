<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow: hidden;
        }
        
        .container {
            width: 100%;
            max-width: 820px;
            background-color: #111111;
            border-radius: 20px;
            padding: 48px 52px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid #222222;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            animation: containerPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes containerPop {
            from {
                opacity: 0;
                transform: scale(0.7) translateY(40px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .left {
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 32px;
            letter-spacing: -1px;
            animation: titleFade 1s ease 0.2s backwards;
        }
        
        @keyframes titleFade {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            color: #aaaaaa;
            font-weight: 500;
            animation: fadeIn 0.6s ease 0.4s backwards;
        }
        
        textarea {
            width: 100%;
            height: 240px;           /* Feste Höhe */
            resize: none;            /* Nicht veränderbar */
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 18px;
            color: #ffffff;
            font-size: 17px;
            outline: none;
            transition: all 0.3s ease;
            animation: inputPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s backwards;
        }
        
        textarea:focus {
            border-color: #666666;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.08);
            transform: translateY(-2px);
        }
        
        .right {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .preview {
            margin-bottom: 32px;
            padding: 40px;
            background-color: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #222222;
            width: 100%;
            min-height: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .preview::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            opacity: 0;
            transition: all 0.6s ease;
            pointer-events: none;
        }
        
        .preview:hover::before {
            opacity: 1;
            transform: translate(80%, 80%);
        }
        
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .preview:hover #qrcode {
            transform: scale(1.06) rotate(1deg);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        
        .controls {
            display: flex;
            gap: 14px;
            width: 100%;
        }
        
        button {
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40%;
            height: 200%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            transition: all 0.6s;
            opacity: 0;
        }
        
        button:hover::after {
            left: 120%;
            opacity: 1;
        }
        
        .btn-primary {
            background-color: #ffffff;
            color: #000000;
        }
        
        .btn-primary:hover {
            background-color: #f0f0f0;
            transform: translateY(-3px) scale(1.03);
        }
        
        .btn-secondary {
            background-color: #222222;
            color: #ffffff;
        }
        
        .btn-secondary:hover {
            background-color: #333333;
            transform: translateY(-2px);
        }
        
        .empty-state {
            color: #555555;
            font-size: 16px;
            text-align: center;
            animation: fadeIn 1s ease;
        }
        
        .info {
            text-align: center;
            font-size: 14px;
            color: #666666;
            margin-top: 20px;
            animation: fadeIn 1s ease 0.8s backwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes inputPop {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Linke Seite -->
        <div class="left">
            <h1>QR Code Generator</h1>
            
            <div class="input-group">
                <label for="text">Text oder URL</label>
                <textarea id="text" placeholder="Gib hier den Text oder die URL ein..."></textarea>
            </div>
            
            <div class="info">
                Live-Vorschau mit Animationen
            </div>
        </div>
        
        <!-- Rechte Seite -->
        <div class="right">
            <div class="preview" id="previewBox">
                <div id="qrcode-container">
                    <div id="qrcode"></div>
                </div>
                <div id="empty" class="empty-state">
                    Der QR-Code erscheint hier
                </div>
            </div>
            
            <div class="controls">
                <button onclick="downloadQR()" class="btn-primary" id="downloadBtn" disabled>
                    Als PNG herunterladen
                </button>
                <button onclick="clearInput()" class="btn-secondary">
                    Löschen
                </button>
            </div>
        </div>
    </div>

    <script>
        let qrcode = null;
        let currentText = '';
        
        const textarea = document.getElementById('text');
        const downloadBtn = document.getElementById('downloadBtn');
        const emptyState = document.getElementById('empty');
        const qrcodeContainer = document.getElementById('qrcode-container');
        const previewBox = document.getElementById('previewBox');
        
        function generateQR(text) {
            if (!text || text.trim() === '') {
                emptyState.style.display = 'block';
                qrcodeContainer.style.display = 'none';
                downloadBtn.disabled = true;
                return;
            }
            
            emptyState.style.display = 'none';
            qrcodeContainer.style.display = 'block';
            
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            
            qrcode = new QRCode(qrDiv, {
                text: text,
                width: 280,
                height: 280,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            
            currentText = text;
            downloadBtn.disabled = false;
            
            // Extra Animation beim Generieren
            previewBox.style.transform = 'scale(0.95)';
            setTimeout(() => {
                previewBox.style.transform = 'scale(1)';
            }, 10);
        }
        
        // Live Update mit Debounce
        let timeout = null;
        textarea.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                generateQR(textarea.value.trim());
            }, 280);
        });
        
        function downloadQR() {
            if (!currentText) return;
            
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) return;
            
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
        
        function clearInput() {
            textarea.value = '';
            generateQR('');
            textarea.focus();
        }
        
        // Initialzustand + kleine Start-Animation
        window.onload = () => {
            emptyState.style.display = 'block';
            qrcodeContainer.style.display = 'none';
            
            // Fokus auf Textfeld nach kurzer Verzögerung
            setTimeout(() => {
                textarea.focus();
            }, 800);
        };
    </script>
</body>
</html>
