<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .container {
            width: 100%;
            max-width: 820px;
            background-color: #111111;
            border-radius: 20px;
            padding: 48px 52px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid #222222;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
        }
        
        .left {
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 32px;
            letter-spacing: -1px;
        }
        
        .input-group {
            flex: 1;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            color: #aaaaaa;
            font-weight: 500;
        }
        
        textarea {
            width: 100%;
            min-height: 240px;
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 18px;
            color: #ffffff;
            font-size: 17px;
            resize: vertical;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        textarea:focus {
            border-color: #666666;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.06);
        }
        
        .right {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .preview {
            margin-bottom: 32px;
            padding: 32px;
            background-color: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #222222;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 340px;
        }
        
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        
        .controls {
            display: flex;
            gap: 14px;
            width: 100%;
        }
        
        button {
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            flex: 1;
        }
        
        .btn-primary {
            background-color: #ffffff;
            color: #000000;
        }
        
        .btn-primary:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: #222222;
            color: #ffffff;
        }
        
        .btn-secondary:hover {
            background-color: #333333;
        }
        
        .empty-state {
            color: #555555;
            font-size: 16px;
            text-align: center;
        }
        
        .info {
            text-align: center;
            font-size: 14px;
            color: #666666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Linke Seite: Eingabe -->
        <div class="left">
            <h1>QR Code Generator</h1>
            
            <div class="input-group">
                <label for="text">Text oder URL</label>
                <textarea id="text" placeholder="Gib hier den Text oder die URL ein, die in den QR-Code soll..."></textarea>
            </div>
            
            <div class="info">
                Der QR-Code wird live aktualisiert
            </div>
        </div>
        
        <!-- Rechte Seite: Vorschau -->
        <div class="right">
            <div class="preview">
                <div id="qrcode-container">
                    <div id="qrcode"></div>
                </div>
                <div id="empty" class="empty-state">
                    Der QR-Code erscheint hier
                </div>
            </div>
            
            <div class="controls">
                <button onclick="downloadQR()" class="btn-primary" id="downloadBtn" disabled>
                    Als PNG herunterladen
                </button>
                <button onclick="clearInput()" class="btn-secondary">
                    Löschen
                </button>
            </div>
        </div>
    </div>

    <script>
        let qrcodeInstance = null;
        let currentText = '';
        
        const textarea = document.getElementById('text');
        const downloadBtn = document.getElementById('downloadBtn');
        const emptyState = document.getElementById('empty');
        const qrcodeContainer = document.getElementById('qrcode-container');
        
        function generateQR(text) {
            if (!text || text.trim() === '') {
                emptyState.style.display = 'block';
                qrcodeContainer.style.display = 'none';
                downloadBtn.disabled = true;
                return;
            }
            
            emptyState.style.display = 'none';
            qrcodeContainer.style.display = 'block';
            
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            
            qrcodeInstance = new QRCode(qrDiv, {
                text: text,
                width: 280,
                height: 280,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            
            currentText = text;
            downloadBtn.disabled = false;
        }
        
        // Live Update mit Debounce
        let timeout = null;
        textarea.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                generateQR(textarea.value.trim());
            }, 250);
        });
        
        function downloadQR() {
            if (!currentText) return;
            
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) return;
            
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
        
        function clearInput() {
            textarea.value = '';
            generateQR('');
            textarea.focus();
        }
        
        // Initialzustand
        window.onload = () => {
            emptyState.style.display = 'block';
            qrcodeContainer.style.display = 'none';
        };
    </script>
</body>
</html>
