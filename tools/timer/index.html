<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Timer & Stoppuhr</title>
    <style>
        :root {
            --bg-main: #0c0812;
            --bg-panel: #180e25;
            --border-color: #26163a;
            --text-main: #f3effa;
            --text-muted: #6e568b;
            --accent-pink: #d61c59;
            --accent-hover: #fa2a73;
            --btn-dark: #1f1230;
            --btn-dark-border: #361f54;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 600px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 35px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            user-select: none;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* Container für Eingabe und Anzeige */
        .timer-box {
            font-size: 5.5rem;
            font-weight: 200;
            margin-bottom: 30px;
            color: var(--text-main);
            background: #08050c;
            border: 2px dashed var(--btn-dark-border);
            border-radius: 8px;
            padding: 25px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: border-color 0.25s, background-color 0.25s;
        }

        .timer-box:hover {
            border-color: var(--border-color);
        }

        /* Styling für die Input-Felder */
        .timer-box input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 5.5rem;
            font-weight: 200;
            width: 115px;
            text-align: center;
            font-family: inherit;
            outline: none;
        }

        .timer-box input::placeholder {
            color: var(--text-muted);
            opacity: 0.3;
        }

        /* Entfernt Pfeile bei Inputs */
        .timer-box input::-webkit-outer-spin-button,
        .timer-box input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .timer-box input[type=number] {
            -moz-appearance: textfield;
        }

        .time-display {
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            width: 100%;
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        #startStopBtn {
            background: var(--accent-pink);
            color: white;
        }

        #startStopBtn:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 12px rgba(214, 28, 89, 0.4);
        }

        #resetBtn {
            background: var(--btn-dark);
            color: var(--text-main);
            border: 1px solid var(--btn-dark-border);
        }

        #resetBtn:hover {
            background: var(--border-color);
            border-color: var(--text-muted);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Spezialzustand wenn Timer läuft */
        button.running {
            background: #441118 !important;
            border: 1px solid #7f1d1d;
            color: #f87171 !important;
            box-shadow: none !important;
        }

        button.running:hover {
            background: #55161e !important;
            color: #fca5a5 !important;
        }

        /* Edles Pulsieren bei Alarm-Ende */
        @keyframes alarm-pulse {
            0% { border-color: var(--accent-pink); box-shadow: 0 0 10px rgba(214, 28, 89, 0.2); color: var(--text-main); }
            50% { border-color: var(--accent-hover); box-shadow: 0 0 25px rgba(214, 28, 89, 0.5); color: var(--accent-hover); }
            100% { border-color: var(--accent-pink); box-shadow: 0 0 10px rgba(214, 28, 89, 0.2); color: var(--text-main); }
        }

        .timer-box.alarm {
            animation: alarm-pulse 1.5s infinite ease-in-out;
            background: #160714;
            border-style: solid;
        }
    </style>
</head>
<body>

    <div class="app">
        <h2>Zen Timer & Stoppuhr</h2>
        <p class="subtitle">Beliebig Zeit eintragen oder bei 00:00:00 starten für Stoppuhr.</p>

        <div class="timer-box" id="timerBox">
            <div id="inputs">
                <input type="number" id="hrs" placeholder="00" min="0" max="99" oninput="if(this.value.length > 2) this.value = this.value.slice(0,2);">:
                <input type="number" id="mins" placeholder="00" min="0" max="59" oninput="if(this.value.length > 2) this.value = this.value.slice(0,2);">:
                <input type="number" id="secs" placeholder="00" min="0" max="59" oninput="if(this.value.length > 2) this.value = this.value.slice(0,2);">
            </div>
            <div id="display" class="time-display" style="display: none;">00:00:00</div>
        </div>
        
        <div class="controls">
            <button id="resetBtn">Reset</button>
            <button id="startStopBtn">Start</button>
        </div>
    </div>

    <script>
        let timerInterval;
        let alarmInterval;

        let totalSeconds = 0;
        let isRunning = false;
        let isPaused = false;
        let stopwatchMode = false;

        let audioCtx = null;

        const startStopBtn = document.getElementById("startStopBtn");
        const resetBtn = document.getElementById("resetBtn");

        const inputsDiv = document.getElementById("inputs");
        const displayDiv = document.getElementById("display");
        const timerBox = document.getElementById("timerBox");

        const hrsInput = document.getElementById("hrs");
        const minsInput = document.getElementById("mins");
        const secsInput = document.getElementById("secs");

        function playZenChime() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            const now = audioCtx.currentTime;
            const notes = [329.63, 440.0, 493.88, 659.25]; // Harmonischer E-Moll Akkord

            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = "sine";
                osc.frequency.value = freq;

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                gain.gain.setValueAtTime(0, now + i * 0.12);
                gain.gain.linearRampToValueAtTime(0.15, now + i * 0.12 + 0.04);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.12 + 1.5);

                osc.start(now + i * 0.12);
                osc.stop(now + i * 0.12 + 1.5);
            });
        }

        function startAlarm() {
            timerBox.classList.add("alarm");
            playZenChime();
            alarmInterval = setInterval(playZenChime, 3000);
        }

        function stopAlarm() {
            clearInterval(alarmInterval);
            timerBox.classList.remove("alarm");
        }

        function updateDisplay() {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;

            displayDiv.textContent =
                `${String(h).padStart(2, "0")}:` +
                `${String(m).padStart(2, "0")}:` +
                `${String(s).padStart(2, "0")}`;
        }

        function startTimer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (!isPaused) {
                const h = parseInt(hrsInput.value) || 0;
                const m = parseInt(minsInput.value) || 0;
                const s = parseInt(secsInput.value) || 0;

                totalSeconds = h * 3600 + m * 60 + s;
                stopwatchMode = totalSeconds === 0;
            }

            inputsDiv.style.display = "none";
            displayDiv.style.display = "block";

            updateDisplay();

            isRunning = true;
            isPaused = false;

            startStopBtn.textContent = "Pause";
            startStopBtn.classList.add("running");

            timerInterval = setInterval(() => {
                if (stopwatchMode) {
                    totalSeconds++;
                    updateDisplay();
                    return;
                }

                totalSeconds--;
                updateDisplay();

                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    startStopBtn.style.display = "none";
                    startAlarm();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            isPaused = true;

            startStopBtn.textContent = "Weiter";
            startStopBtn.classList.remove("running");
        }

        function resetTimer() {
            clearInterval(timerInterval);
            stopAlarm();

            totalSeconds = 0;
            isRunning = false;
            isPaused = false;
            stopwatchMode = false;

            hrsInput.value = "";
            minsInput.value = "";
            secsInput.value = "";

            inputsDiv.style.display = "block";
            displayDiv.style.display = "none";

            startStopBtn.style.display = "inline-block";
            startStopBtn.textContent = "Start";
            startStopBtn.classList.remove("running");
        }

        startStopBtn.addEventListener("click", () => {
            if (!isRunning) {
                startTimer();
            } else {
                pauseTimer();
            }
        });

        resetBtn.addEventListener("click", resetTimer);
    </script>
</body>
</html>
