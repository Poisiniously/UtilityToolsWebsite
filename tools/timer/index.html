<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Dark Timer with Zen Alarm</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0c;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .timer-container {
            text-align: center;
            user-select: none;
        }

        /* Container für Eingabe und Anzeige */
        .timer-box {
            font-size: 7.5rem;
            font-weight: 200;
            margin-bottom: 2.5rem;
            color: #f8fafc;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Styling für die Input-Felder */
        .timer-box input {
            background: transparent;
            border: none;
            color: #f8fafc;
            font-size: 7.5rem;
            font-weight: 200;
            width: 160px;
            text-align: center;
            font-family: inherit;
            outline: none;
        }

        /* Entfernt Pfeile bei Inputs */
        .timer-box input::-webkit-outer-spin-button,
        .timer-box input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .timer-box input[type=number] {
            -moz-appearance: textfield;
        }

        .time-display {
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 1.25rem;
            justify-content: center;
        }

        button {
            background: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            border-color: rgba(255, 255, 255, 0.2);
        }

        button:active {
            transform: scale(0.96);
        }

        button.running {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        button.running:hover {
            background: rgba(239, 68, 68, 0.18);
            color: #fca5a5;
        }

        /* Sanftes Pulsieren am Ende */
        @keyframes alarm-pulse {
            0% { opacity: 1; color: #f8fafc; }
            50% { opacity: 0.4; color: #a78bfa; }
            100% { opacity: 1; color: #f8fafc; }
        }

        .alarm {
            animation: alarm-pulse 2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="timer-box" id="timerBox">
            <div id="inputs">
                <input type="number" id="hrs" placeholder="00" min="0" max="99" oninput="if(this.value.length > 2) this.value = this.value.slice(0,2);">:
                <input type="number" id="mins" placeholder="00" min="0" max="59" oninput="if(this.value.length > 2) this.value = this.value.slice(0,2);">:
                <input type="number" id="secs" placeholder="00" min="0" max="59" oninput="if(this.value.length > 2) this.value = this.value.slice(0,2);">
            </div>
            <div id="display" class="time-display" style="display: none;">00:00:00</div>
        </div>
        
        <div class="controls">
            <button id="startStopBtn">Start</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
       let timerInterval;
let alarmInterval;

let totalSeconds = 0;
let isRunning = false;
let isPaused = false;
let stopwatchMode = false;

let audioCtx = null;

const startStopBtn = document.getElementById("startStopBtn");
const resetBtn = document.getElementById("resetBtn");

const inputsDiv = document.getElementById("inputs");
const displayDiv = document.getElementById("display");
const timerBox = document.getElementById("timerBox");

const hrsInput = document.getElementById("hrs");
const minsInput = document.getElementById("mins");
const secsInput = document.getElementById("secs");

function playZenChime() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const now = audioCtx.currentTime;
    const notes = [329.63, 440.0, 493.88, 659.25];

    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.value = freq;

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        gain.gain.setValueAtTime(0, now + i * 0.12);
        gain.gain.linearRampToValueAtTime(0.15, now + i * 0.12 + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.12 + 1.5);

        osc.start(now + i * 0.12);
        osc.stop(now + i * 0.12 + 1.5);
    });
}

function startAlarm() {
    timerBox.classList.add("alarm");

    playZenChime();
    alarmInterval = setInterval(playZenChime, 3000);
}

function stopAlarm() {
    clearInterval(alarmInterval);
    timerBox.classList.remove("alarm");
}

function updateDisplay() {
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    displayDiv.textContent =
        `${String(h).padStart(2, "0")}:` +
        `${String(m).padStart(2, "0")}:` +
        `${String(s).padStart(2, "0")}`;
}

function startTimer() {

    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (!isPaused) {

        const h = parseInt(hrsInput.value) || 0;
        const m = parseInt(minsInput.value) || 0;
        const s = parseInt(secsInput.value) || 0;

        totalSeconds = h * 3600 + m * 60 + s;

        stopwatchMode = totalSeconds === 0;
    }

    inputsDiv.style.display = "none";
    displayDiv.style.display = "block";

    updateDisplay();

    isRunning = true;
    isPaused = false;

    startStopBtn.textContent = "Pause";
    startStopBtn.classList.add("running");

    timerInterval = setInterval(() => {

        if (stopwatchMode) {

            totalSeconds++;
            updateDisplay();

            return;
        }

        totalSeconds--;

        updateDisplay();

        if (totalSeconds <= 0) {

            clearInterval(timerInterval);

            isRunning = false;

            startStopBtn.style.display = "none";

            startAlarm();
        }

    }, 1000);
}

function pauseTimer() {

    clearInterval(timerInterval);

    isRunning = false;
    isPaused = true;

    startStopBtn.textContent = "Continue";
    startStopBtn.classList.remove("running");
}

function resetTimer() {

    clearInterval(timerInterval);
    stopAlarm();

    totalSeconds = 0;

    isRunning = false;
    isPaused = false;
    stopwatchMode = false;

    hrsInput.value = "";
    minsInput.value = "";
    secsInput.value = "";

    inputsDiv.style.display = "block";
    displayDiv.style.display = "none";

    startStopBtn.style.display = "inline-block";
    startStopBtn.textContent = "Start";
    startStopBtn.classList.remove("running");
}

startStopBtn.addEventListener("click", () => {

    if (!isRunning) {
        startTimer();
    } else {
        pauseTimer();
    }

});

resetBtn.addEventListener("click", resetTimer);
    </script>
</body>
</html>
