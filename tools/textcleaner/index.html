<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickText Fixer</title>
    <style>
        :root {
            --bg-main: #0c0812;
            --bg-panel: #180e25;
            --border-color: #26163a;
            --text-main: #f3effa;
            --text-muted: #6e568b;
            --accent-pink: #d61c59;
            --accent-hover: #fa2a73;
            --btn-dark: #1f1230;
            --btn-dark-border: #361f54;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--bg-panel);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 700px;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            text-align: center;
            color: var(--text-main);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            background-color: #08050c;
            border: 1px solid var(--btn-dark-border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-pink);
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        button {
            background-color: var(--btn-dark);
            color: var(--text-main);
            border: 1px solid var(--btn-dark-border);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--border-color);
            border-color: var(--text-muted);
        }

        button:active {
            transform: scale(0.98);
        }

        button.action-copy {
            background-color: var(--accent-pink);
            border: none;
            color: white;
            grid-column: 1 / -1;
            margin-top: 10px;
            font-size: 1.05rem;
            font-weight: bold;
        }

        button.action-copy:hover {
            background-color: var(--accent-hover);
            box-shadow: 0 0 12px rgba(214, 28, 89, 0.4);
        }

        .status-msg {
            text-align: center;
            color: var(--accent-pink);
            font-weight: bold;
            margin-top: 15px;
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>QuickText Fixer</h1>
    <p class="subtitle">Füge deinen Text ein und bereinige ihn mit nur einem Klick.</p>

    <textarea id="textInput" placeholder="Füge deinen Text hier ein..."></textarea>

    <div class="button-grid">
        <button onclick="removeLineBreaks()">Zeilenumbrüche entfernen</button>
        <button onclick="removeDoubleSpaces()">Doppelte Leerzeichen</button>
        <button onclick="toUpperCase()">ALLES GROSS</button>
        <button onclick="toLowerCase()">alles klein</button>
        <button onclick="stripHTML()">HTML-Tags entfernen</button>
        <button onclick="clearText()">Text löschen</button>
        
        <button class="action-copy" onclick="copyToClipboard()">Text kopieren</button>
    </div>

    <div id="status" class="status-msg">Erfolgreich kopiert!</div>
</div>

<script>
    const textarea = document.getElementById('textInput');
    const statusDiv = document.getElementById('status');

    function showStatus(message) {
        statusDiv.innerText = message;
        statusDiv.style.opacity = '1';
        setTimeout(() => {
            statusDiv.style.opacity = '0';
        }, 2000);
    }

    function removeLineBreaks() {
        textarea.value = textarea.value.replace(/\r?\n|\r/g, " ");
        removeDoubleSpaces();
    }

    function removeDoubleSpaces() {
        textarea.value = textarea.value.replace(/\s+/g, " ");
    }

    function toUpperCase() {
        textarea.value = textarea.value.toUpperCase();
    }

    function toLowerCase() {
        textarea.value = textarea.value.toLowerCase();
    }

    function stripHTML() {
        textarea.value = textarea.value.replace(/<\/?[^>]+(>|$)/g, "");
    }

    function clearText() {
        textarea.value = "";
    }

    function copyToClipboard() {
        if (!textarea.value.trim()) {
            showStatus("Nichts zum Kopieren da!");
            return;
        }
        
        textarea.select();
        textarea.setSelectionRange(0, 99999);

        navigator.clipboard.writeText(textarea.value).then(() => {
            showStatus("Erfolgreich kopiert!");
        }).catch(() => {
            showStatus("Fehler beim Kopieren.");
        });
    }
</script>

</body>
</html>
