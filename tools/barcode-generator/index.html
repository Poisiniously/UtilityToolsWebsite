<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator</title>
    <script src=""></script>
    <style>
        :root {
            --bg-main: #0c0812;
            --bg-panel: #180e25;
            --border-color: #26163a;
            --text-main: #f3effa;
            --text-muted: #6e568b;
            --accent-pink: #d61c59;
            --accent-hover: #fa2a73;
            --btn-dark: #1f1230;
            --btn-dark-border: #361f54;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden; /* Verhindert das Scrollen der Seite */
        }

        .app {
            width: 100%;
            max-width: 600px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
        }

        h2 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .preview {
            width: 100%;
            min-height: 320px;
            padding: 30px;
            margin-bottom: 25px;
            border: 2px dashed var(--btn-dark-border);
            border-radius: 8px;
            background: #08050c;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: .25s;
        }

        .preview:hover {
            border-color: var(--accent-pink);
            background: #120a1c;
        }

        .empty-state {
            color: var(--text-muted);
            font-size: 0.95rem;
            text-align: center;
        }

        .preview:hover #qrcode {
            transform: scale(1.02);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 14px;
            background: #08050c;
            color: var(--text-main);
            border: 1px solid var(--btn-dark-border);
            border-radius: 8px;
            font-size: .95rem;
            resize: none;
            transition: .25s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-pink);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: .95rem;
            font-weight: bold;
            transition: .2s;
            border: none;
        }

        .btn-clear {
            background: var(--btn-dark);
            color: var(--text-main);
            border: 1px solid var(--btn-dark-border);
        }

        .btn-clear:hover {
            background: var(--border-color);
            border-color: var(--text-muted);
        }

        .btn-download {
            background: var(--accent-pink);
            color: white;
        }

        .btn-download:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 0 12px rgba(214,28,89,.4);
        }

        .btn-download:disabled {
            background: #2a1123;
            color: #553444;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <h2>Barcode Generator</h2>
        <p class="subtitle">Der Barcode wird live beim Tippen generiert.</p>

        <div class="preview">
            <div id="qrcode-container">
                <div id="qrcode"></div>
            </div>
            <div id="empty" class="empty-state">
                Der Barcode erscheint hier
            </div>
        </div>

        <div class="input-group">
            <label for="text">Text oder URL</label>
            <textarea id="text" placeholder="Gib hier den Text oder die URL ein, die in den QR-Code soll..."></textarea>
        </div>

        <div class="controls">
            <button onclick="clearInput()" class="btn-clear">Löschen</button>
            <button onclick="downloadQR()" class="btn-download" id="downloadBtn" disabled>Download as png</button>
        </div>
    </div>

    <script>
    </script>
</body>
</html>
