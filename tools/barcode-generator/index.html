<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator | Utility Hub</title>
    <style>
        :root {
            --background: #0d0714;
            --surface: rgba(26, 12, 38, .65);
            --primary: #ff007f;
            --secondary: #00f0ff;
            --text: #f4f4ff;
            --text-secondary: #a0a0c0;
            --border: rgba(255, 255, 255, .08);
            --font: 'Outfit', 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--background);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .title { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; color: var(--secondary); }
        
        input {
            width: 100%;
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font);
            margin-bottom: 20px;
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        #barcodeContainer {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
        }

        .hint { font-size: 0.9rem; color: var(--text-secondary); margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Barcode Generator</div>
    <input type="text" id="barcodeInput" placeholder="Text oder Nummer eingeben..." value="">
    <div id="barcodeContainer">
        <svg id="barcode"></svg>
    </div>
    <div class="hint">Unterstützt Code128 Format</div>
</div>

<!-- Einbindung der JS-Bibliothek für Barcodes -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script>
    const input = document.getElementById('barcodeInput');
    const barcode = document.getElementById('barcode');

    function generate() {
        const val = input.value || " ";
        JsBarcode("#barcode", val, {
            format: "CODE128",
            lineColor: "#0d0714",
            width: 3,
            height: 100,
            displayValue: true
        });
    }

    input.addEventListener('input', generate);
    generate();
</script>
</body>
</html>
