<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --bg-main: #0c0812;
            --bg-panel: #180e25;
            --border-color: #26163a;
            --text-main: #f3effa;
            --text-muted: #6e568b;
            --accent-pink: #d61c59;
            --accent-hover: #fa2a73;
            --btn-dark: #1f1230;
            --btn-dark-border: #361f54;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 700px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
        }

        h2 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .preview {
            width: 100%;
            min-height: 220px;
            padding: 30px;
            margin-bottom: 25px;
            border: 2px dashed var(--btn-dark-border);
            border-radius: 8px;
            background: #08050c;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: .25s;
        }

        .preview:hover {
            border-color: var(--accent-pink);
            background: #120a1c;
        }

        .empty-state {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        #barcode {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .preview:hover #barcode {
            transform: scale(1.02);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: bold;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            background: #08050c;
            color: var(--text-main);
            border: 1px solid var(--btn-dark-border);
            border-radius: 8px;
            font-size: .95rem;
            transition: .25s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent-pink);
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-header label {
            margin-bottom: 0;
        }

        .slider-header span {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-pink);
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: .95rem;
            font-weight: bold;
            transition: .2s;
            border: none;
        }

        .btn-clear {
            background: var(--btn-dark);
            color: var(--text-main);
            border: 1px solid var(--btn-dark-border);
        }

        .btn-clear:hover {
            background: var(--border-color);
            border-color: var(--text-muted);
        }

        .btn-download {
            background: var(--accent-pink);
            color: white;
        }

        .btn-download:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 0 12px rgba(214,28,89,.4);
        }

        .btn-download:disabled {
            background: #2a1123;
            color: #553444;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <h2>Barcode Generator</h2>
        <p class="subtitle">Erstelle und lade Barcodes herunter.</p>

        <div class="preview">
            <div id="barcode-container">
                <svg id="barcode"></svg>
            </div>
            <div id="empty" class="empty-state">
                Der Barcode erscheint hier
            </div>
        </div>

        <div class="input-group">
            <label for="text">Inhalt</label>
            <input type="text" id="text" placeholder="z.B. 123456789012" value="123456789012">
        </div>

        <div class="input-group">
            <label for="type">Barcode Typ</label>
            <select id="type">
                <option value="CODE128">CODE128 (empfohlen)</option>
                <option value="EAN13">EAN-13</option>
                <option value="EAN8">EAN-8</option>
                <option value="CODE39">CODE39</option>
                <option value="ITF14">ITF-14</option>
                <option value="UPC">UPC-A</option>
            </select>
        </div>
        
        <div class="options">
            <div class="input-group">
                <div class="slider-header">
                    <label for="width">Breite</label>
                    <span id="widthVal">2.0</span>
                </div>
                <input type="range" id="width" min="1" max="4" step="0.1" value="2">
            </div>
            <div class="input-group">
                <div class="slider-header">
                    <label for="height">Höhe</label>
                    <span id="heightVal">100px</span>
                </div>
                <input type="range" id="height" min="40" max="200" step="5" value="100">
            </div>
        </div>

        <div class="controls">
            <button onclick="clearInput()" class="btn-clear">Löschen</button>
            <button onclick="downloadBarcode()" class="btn-download" id="downloadBtn" disabled>Als PNG herunterladen</button>
        </div>
    </div>

    <script>
        let currentText = '';
        
        const input = document.getElementById('text');
        const typeSelect = document.getElementById('type');
        const widthSlider = document.getElementById('width');
        const heightSlider = document.getElementById('height');
        const widthVal = document.getElementById('widthVal');
        const heightVal = document.getElementById('heightVal');
        const downloadBtn = document.getElementById('downloadBtn');
        const emptyState = document.getElementById('empty');
        const barcodeContainer = document.getElementById('barcode-container');
        
        function generateBarcode() {
            const text = input.value.trim();
            
            if (!text) {
                emptyState.style.display = 'block';
                barcodeContainer.style.display = 'none';
                downloadBtn.disabled = true;
                return;
            }
            
            emptyState.style.display = 'none';
            barcodeContainer.style.display = 'block';
            
            const svg = document.getElementById('barcode');
            svg.innerHTML = '';
            
            try {
                JsBarcode("#barcode", text, {
                    format: typeSelect.value,
                    lineColor: "#000000",
                    width: parseFloat(widthSlider.value),
                    height: parseFloat(heightSlider.value),
                    displayValue: true,
                    fontOptions: "bold",
                    fontSize: 18,
                    margin: 15,
                    background: "#ffffff"
                });
                
                currentText = text;
                downloadBtn.disabled = false;
            } catch (e) {
                console.error(e);
                emptyState.textContent = "Ungültiger Inhalt für diesen Barcode-Typ";
                emptyState.style.display = 'block';
                barcodeContainer.style.display = 'none';
                downloadBtn.disabled = true;
            }
        }
        
        // Event Listener
        input.addEventListener('input', generateBarcode);
        typeSelect.addEventListener('change', generateBarcode);
        
        widthSlider.addEventListener('input', () => {
            widthVal.textContent = parseFloat(widthSlider.value).toFixed(1);
            generateBarcode();
        });
        
        heightSlider.addEventListener('input', () => {
            heightVal.textContent = heightSlider.value + 'px';
            generateBarcode();
        });
        
        function downloadBarcode() {
            if (!currentText) return;
            
            const svg = document.getElementById('barcode');
            const svgData = new XMLSerializer().serializeToString(svg);
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            
            const img = new Image();
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                const link = document.createElement('a');
                link.download = 'barcode.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            };
            
            img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
        }
        
        function clearInput() {
            input.value = '';
            generateBarcode();
            input.focus();
        }
        
        // Initial generieren
        window.onload = () => {
            generateBarcode();
        };
    </script>
</body>
</html>
