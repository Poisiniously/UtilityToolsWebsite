<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Dark Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0c;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .calc-container {
            width: 340px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 2rem;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Die Anzeige für die Zahlen */
        .calc-display {
            font-size: 3.5rem;
            font-weight: 200;
            color: #f8fafc;
            text-align: right;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
            overflow-x: auto;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            /* Versteckt die Scrollbar */
            scrollbar-width: none; 
        }
        .calc-display::-webkit-scrollbar {
            display: none;
        }

        /* Tasten-Grid */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
        }

        /* Grundstyle für alle Tasten */
        button {
            background: rgba(255, 255, 255, 0.03);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            height: 64px;
            font-size: 1.25rem;
            font-weight: 400;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #f8fafc;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Spezial-Styling für Operatoren (+, -, *, /, =) */
        button.operator {
            background: rgba(167, 139, 250, 0.05); /* Sanfter Lila-Touch passend zum Timer */
            border-color: rgba(167, 139, 250, 0.15);
            color: #a78bfa;
        }

        button.operator:hover {
            background: rgba(167, 139, 250, 0.15);
            border-color: rgba(167, 139, 250, 0.3);
            color: #c084fc;
        }

        /* Styling für die Gleich-Taste */
        button.equals {
            grid-column: span 2;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #f8fafc;
        }
        button.equals:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Löschen-Taste (C) */
        button.clear {
            color: #f87171;
            background: rgba(239, 68, 68, 0.03);
            border-color: rgba(239, 68, 68, 0.1);
        }
        button.clear:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.25);
        }
    </style>
</head>
<body>

    <div class="calc-container">
        <div class="calc-display" id="display">0</div>
        
        <div class="calc-grid">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            <button class="operator" onclick="appendOperator('-')">−</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button onclick="appendNumber('.')">.</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendNumber('0')">0</button>
            
            <button class="equals" style="grid-column: span 4;" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let currentInput = '0';
        let shouldResetDisplay = false;

        function appendNumber(num) {
            if (currentInput === '0' && num !== '.' || shouldResetDisplay) {
                currentInput = num;
                shouldResetDisplay = false;
            } else {
                // Verhindert doppelte Dezimalpunkte in einer Zahl
                if (num === '.' && currentInput.split(/[\+\-\*\/]/).pop().includes('.')) return;
                currentInput += num;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (shouldResetDisplay) shouldResetDisplay = false;
            
            // Verhindert, dass zwei Operatoren direkt hintereinander stehen
            const lastChar = currentInput.slice(-1);
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + op;
            } else {
                currentInput += op;
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            updateDisplay();
        }

        function calculate() {
            try {
                // Berechnet das Ergebnis sicher aus dem String
                let result = Function('"use strict";return (' + currentInput + ')')();
                
                // Rundet lange Dezimalzahlen sinnvoll ab, um das Design nicht zu sprengen
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(8));
                }
                
                currentInput = result.toString();
                shouldResetDisplay = true;
            } catch (error) {
                currentInput = 'Error';
                shouldResetDisplay = true;
            }
            updateDisplay();
        }

        function updateDisplay() {
            // Ersetzt die mathematischen Zeichen für die Anzeige durch schönere Symbole
            let displayText = currentInput
                .replace(/\*/g, ' × ')
                .replace(/\//g, ' ÷ ')
                .replace(/\+/g, ' + ')
                .replace(/\-/g, ' − ');
            
            display.textContent = displayText;
        }
    </script>
</body>
</html>
