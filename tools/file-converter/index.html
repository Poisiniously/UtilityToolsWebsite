<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal File Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --background: #0d0714;
            --surface: rgba(26, 12, 38, 0.65);
            --primary: #ff007f;
            --secondary: #00f0ff;
            --text: #f4f4ff;
            --text-secondary: #a0a0c0;
            --border: rgba(255, 255, 255, 0.08);
            --btn-dark: #1f1230;
            --btn-dark-border: #361f54;
        }

        html {
            color-scheme: dark;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Segoe UI', sans-serif;
        }

        body {
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 700px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 0, 127, 0.05);
        }

        h2 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }

        .drop {
            width: 100%;
            padding: 45px 20px;
            border: 2px dashed var(--btn-dark-border);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.2);
            transition: 0.25s ease;
        }

        .drop:hover, .drop.active {
            border-color: var(--secondary);
            background: rgba(0, 240, 255, 0.03);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .file {
            display: none;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
        }

        .file-name {
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .file-size {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        select {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: var(--btn-dark);
            color: var(--text);
            border: 1px solid var(--btn-dark-border);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.25s ease;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.25s ease;
        }

        #convertBtn {
            background: var(--btn-dark);
            color: var(--text);
            border: 1px solid var(--btn-dark-border);
        }

        #convertBtn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
        }

        .download {
            display: none;
            background: var(--primary);
            border: none;
            color: white;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        .download:hover {
            background: #ff2a93;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
        }
    </style>
</head>

<body>
    <div class="app">
        <h2>Universal File Converter</h2>
        <p class="subtitle">Convert between Code, Vector Graphics, Text and Images.</p>

        <div class="drop" id="drop">
            <span>Drop file here or click to browse</span>
            <input type="file" id="fileInput" accept="*/*" hidden>
        </div>

        <div class="file" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <select id="format"></select>

        <button id="convertBtn">Convert File</button>
        <button id="downloadBtn" class="download">Download Converted File</button>
    </div>

    <script>
        const drop = document.getElementById("drop");
        const fileInput = document.getElementById("fileInput");
        const fileInfo = document.getElementById("fileInfo");
        const fileName = document.getElementById("fileName");
        const fileSize = document.getElementById("fileSize");
        const format = document.getElementById("format");
        const convertBtn = document.getElementById("convertBtn");
        const downloadBtn = document.getElementById("downloadBtn");

        let currentFile = null;
        let currentBlob = null;

        // Erweiterte Formatlisten für bekannte Dateiarten
        const textFormats = ["txt", "md", "json", "csv", "html", "xml", "js", "ts", "css", "yaml", "yml", "svg"];
        const imageFormats = ["png", "jpg", "jpeg", "webp", "gif", "bmp", "ico", "svg"];

        drop.addEventListener("click", () => fileInput.click());

        drop.addEventListener("dragover", e => {
            e.preventDefault();
            drop.classList.add("active");
        });

        drop.addEventListener("dragleave", () => {
            drop.classList.remove("active");
        });

        drop.addEventListener("drop", (e) => {
            e.preventDefault();
            drop.classList.remove("active");
            if (e.dataTransfer.files.length) {
                registerFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener("change", e => {
            if (e.target.files.length) {
                registerFile(e.target.files[0]);
            }
        });

        function registerFile(file) {
            currentFile = file;
            currentBlob = null;

            const extension = file.name.split(".").pop().toLowerCase();

            fileInfo.style.display = "block";
            downloadBtn.style.display = "none";

            fileName.textContent = file.name;
            fileSize.textContent = (file.size / 1024).toFixed(1) + " KB";

            format.innerHTML = "";

            let availableTargets = [];

            // Spezialfall SVG: Kann in alles (Bilder & Code) konvertiert werden
            if (extension === "svg") {
                availableTargets = [...new Set([...imageFormats, ...textFormats])].filter(f => f !== "svg");
            } 
            // Normale Bildformate
            else if (imageFormats.includes(extension)) {
                availableTargets = imageFormats.filter(f => f !== extension);
            } 
            // Text- und Codeformate
            else {
                availableTargets = textFormats.filter(f => f !== extension);
                if (availableTargets.length === textFormats.length) {
                    availableTargets = textFormats;
                }
            }

            availableTargets.forEach(type => {
                const option = document.createElement("option");
                option.value = type;
                option.innerText = type.toUpperCase();
                format.appendChild(option);
            });
        }

        convertBtn.addEventListener("click", () => {
            if (!currentFile) {
                alert("Select a file first.");
                return;
            }

            const extension = currentFile.name.split(".").pop().toLowerCase();
            const target = format.value;

            // Logik-Routing basierend auf Zielformat
            if (imageFormats.includes(target) && target !== "svg") {
                convertImage(target);
            } else {
                convertText(extension, target);
            }
        });

        // Konvertierung von Text, Code-Strukturen und SVG als Quell-Code
        function convertText(ext, target) {
            const reader = new FileReader();

            reader.onload = e => {
                let text = e.target.result;
                let output = text;
                let mime = "text/plain";

                // CSV zu JSON
                if (ext === "csv" && target === "json") {
                    const lines = text.trim().split("\n");
                    if (lines.length > 0) {
                        const headers = lines.shift().split(",");
                        const data = lines.map(line => {
                            const values = line.split(",");
                            let obj = {};
                            headers.forEach((h, i) => {
                                obj[h.trim()] = values[i]?.trim() || "";
                            });
                            return obj;
                        });
                        output = JSON.stringify(data, null, 2);
                    }
                }
                // JSON zu CSV
                else if (ext === "json" && target === "csv") {
                    try {
                        const parsed = JSON.parse(text);
                        const arr = Array.isArray(parsed) ? parsed : [parsed];
                        if (arr.length > 0) {
                            const headers = Object.keys(arr[0]);
                            const csvRows = [headers.join(",")];
                            for (const row of arr) {
                                const values = headers.map(header => {
                                    const val = row[header] ? String(row[header]).replace(/"/g, '""') : '';
                                    return `"${val}"`;
                                });
                                csvRows.push(values.join(","));
                            }
                            output = csvRows.join("\n");
                        }
                    } catch (err) {
                        alert("Invalid JSON format for CSV conversion.");
                        return;
                    }
                }
                // Markdown zu HTML
                else if (ext === "md" && target === "html") {
                    output = text
                        .replace(/^# (.*)$/gm, "<h1>$1</h1>")
                        .replace(/^## (.*)$/gm, "<h2>$1</h2>")
                        .replace(/^### (.*)$/gm, "<h3>$1</h3>")
                        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
                        .replace(/\*(.*?)\*/g, "<em>$1</em>")
                        .replace(/\n/g, "<br>");
                }
                // Bild (z.B. PNG) zu SVG Vektor-Container (Einbettung als Base64)
                else if (imageFormats.includes(ext) && target === "svg") {
                    // Da wir das Bild bereits als Text lesen wollen, brechen wir hier ab und nutzen readAsDataURL
                    convertImageToSvg();
                    return;
                }

                // Mime-Types zuweisen
                if (target === "json") mime = "application/json";
                else if (target === "html") mime = "text/html";
                else if (target === "xml") mime = "application/xml";
                else if (target === "svg") mime = "image/svg+xml";
                else if (target === "js") mime = "application/javascript";
                else if (target === "ts") mime = "application/x-typescript";
                else if (target === "css") mime = "text/css";
                else if (target === "yaml" || target === "yml") mime = "application/x-yaml";

                currentBlob = new Blob([output], { type: mime });
                downloadBtn.style.display = "block";
            };

            reader.readAsText(currentFile);
        }

        // Konvertierung von Rasterbildern & SVG-Quellen in Rastergrafiken (Canvas-basiert)
        function convertImage(target) {
            const reader = new FileReader();

            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    canvas.width = img.width;
                    canvas.height = img.height;

                    const ctx = canvas.getContext("2d");
                    
                    // Weißer Hintergrund für JPEG/BMP falls Transparenzen vorhanden sind
                    if (["jpg", "jpeg", "bmp"].includes(target)) {
                        ctx.fillStyle = "#ffffff";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }

                    ctx.drawImage(img, 0, 0);

                    canvas.toBlob(blob => {
                        currentBlob = blob;
                        downloadBtn.style.display = "block";
                    }, "image/" + (target === "jpg" ? "jpeg" : target), 0.95);
                };
                img.src = e.target.result;
            };

            // Falls es sich um ein SVG handelt, erstellen wir ein Blob-URL-Objekt für das Image
            if (currentFile.name.split(".").pop().toLowerCase() === "svg") {
                const textReader = new FileReader();
                textReader.onload = evt => {
                    const svgBlob = new Blob([evt.target.result], {type: 'image/svg+xml;charset=utf-8'});
                    const url = URL.createObjectURL(svgBlob);
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        canvas.width = img.width || 500; // Fallback falls Dimensionen fehlen
                        canvas.height = img.height || 500;
                        const ctx = canvas.getContext("2d");
                        if (["jpg", "jpeg", "bmp"].includes(target)) {
                            ctx.fillStyle = "#ffffff";
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                        ctx.drawImage(img, 0, 0);
                        canvas.toBlob(blob => {
                            currentBlob = blob;
                            downloadBtn.style.display = "block";
                            URL.revokeObjectURL(url);
                        }, "image/" + (target === "jpg" ? "jpeg" : target), 0.95);
                    };
                    img.src = url;
                };
                textReader.readAsText(currentFile);
            } else {
                reader.readAsDataURL(currentFile);
            }
        }

        // Hilfsfunktion: Bild-Datei in ein valides Vektor-SVG kapseln
        function convertImageToSvg() {
            const imgReader = new FileReader();
            imgReader.onload = event => {
                const base64Data = event.target.result;
                // Dynamisches Auslesen der Dimensionen über temporäres Image-Objekt
                const tempImg = new Image();
                tempImg.onload = () => {
                    const svgOutput = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${tempImg.width} ${tempImg.height}" width="${tempImg.width}" height="${tempImg.height}">\n  <image width="${tempImg.width}" height="${tempImg.height}" href="${base64Data}"/>\n</svg>`;
                    currentBlob = new Blob([svgOutput], { type: "image/svg+xml" });
                    downloadBtn.style.display = "block";
                };
                tempImg.src = base64Data;
            };
            imgReader.readAsDataURL(currentFile);
        }

        // Download Trigger
        downloadBtn.addEventListener("click", () => {
            if (!currentBlob) return;

            const a = document.createElement("a");
            const url = URL.createObjectURL(currentBlob);
            a.href = url;

            const name = currentFile.name.substring(0, currentFile.name.lastIndexOf("."));
            a.download = name + "." + format.value;

            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
