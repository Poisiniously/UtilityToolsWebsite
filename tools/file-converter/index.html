<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Converter</title>

<style>
/* CSS Tokens nach offizieller Design-Spezifikation */
:root {
  --background: #0d0714;
  --surface: rgba(26, 12, 38, 0.65);
  --primary: #ff007f;
  --secondary: #00f0ff;
  --text: #f4f4ff;
  --text-secondary: #a0a0c0;
  --border: rgba(255, 255, 255, 0.08);
  --neon-glow: 0 0 15px rgba(255, 0, 127, 0.4);
  --secondary-glow: 0 0 15px rgba(0, 240, 255, 0.4);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Outfit', 'Segoe UI', sans-serif;
}

body {
  background: var(--bg-panel)
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* Glassmorphic App Container */
.app {
  width: 100%;
  max-width: 500px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 30px;
  border: 1px solid var(--border);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Typografie */
h2 {
  text-align: center;
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
  text-shadow: 0 0 10px rgba(244, 244, 255, 0.2);
}

p.subtitle {
  text-align: center;
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-bottom: 25px;
}

/* Cyberpunk Drop Zone mit Neon-Gradients */
.drop {
  position: relative;
  border: 2px dashed rgba(0, 240, 255, 0.3);
  border-radius: 16px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  background: rgba(8, 5, 12, 0.4);
  color: var(--text-secondary);
  font-weight: 500;
  transition: all 0.3s ease;
  overflow: hidden;
}

.drop:hover {
  border-color: var(--secondary);
  background: rgba(0, 240, 255, 0.05);
  color: var(--text);
  box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.1), var(--secondary-glow);
}

.drop.active {
  border-color: var(--primary);
  background: rgba(255, 0, 127, 0.05);
  box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.1), var(--neon-glow);
}

/* Info Box für hochgeladene Dateien */
.file {
  display: none;
  margin: 20px 0;
  padding: 15px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.file-name {
  font-weight: 600;
  color: var(--text);
  word-break: break-all;
  margin-bottom: 4px;
}

.file-size {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

/* Custom Styled Select Dropdown */
select {
  width: 100%;
  padding: 12px 16px;
  margin-bottom: 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0d0714;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  cursor: pointer;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

select:focus {
  border-color: var(--secondary);
  box-shadow: var(--secondary-glow);
}

/* Premium Buttons mit Glow- & Skalierungs-Effekten */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

#convertBtn {
  background: var(--primary);
  color: #ffffff;
  box-shadow: 0 4px 12px rgba(255, 0, 127, 0.2);
}

#convertBtn:hover {
  background: #ff3399;
  box-shadow: var(--neon-glow);
  transform: translateY(-1px);
}

#convertBtn:active {
  transform: translateY(1px);
}

.download {
  display: none;
  margin-top: 12px;
  background: transparent;
  color: var(--secondary);
  border: 1px solid var(--secondary);
  box-shadow: 0 4px 12px rgba(0, 240, 255, 0.1);
}

.download:hover {
  background: rgba(0, 240, 255, 0.1);
  box-shadow: var(--secondary-glow);
  transform: translateY(-1px);
}

.download:active {
  transform: translateY(1px);
}
</style>
</head>

<body>

<div class="app">
  <h2>File Converter</h2>
  <p class="subtitle">Convert files directly in your browser</p>

  <div class="drop" id="drop">
    <span>Drop file here or click to browse</span>
    <input type="file" id="fileInput" hidden>
  </div>

  <div class="file" id="fileInfo">
    <div class="file-name" id="fileName"></div>
    <div class="file-size" id="fileSize"></div>
  </div>

  <select id="format"></select>

  <button id="convertBtn">Convert File</button>
  <button id="downloadBtn" class="download">Download Converted File</button>
</div>

<script>
// Strikt lesbare Referenzen mit const gem. Richtlinie
const drop = document.getElementById("drop");
const fileInput = document.getElementById("fileInput");
const fileInfo = document.getElementById("fileInfo");
const fileName = document.getElementById("fileName");
const fileSize = document.getElementById("fileSize");
const format = document.getElementById("format");
const convertBtn = document.getElementById("convertBtn");
const downloadBtn = document.getElementById("downloadBtn");

let currentFile = null;
let currentBlob = null;

const allowedFormats = {
  csv: ["json", "txt"],
  txt: ["json", "md"],
  md: ["html", "txt"],
  png: ["jpeg"],
  jpg: ["png"]
};

// Event Listeners (Saubere Trennung vom HTML-Markup)
drop.addEventListener("click", () => fileInput.click());

drop.addEventListener("dragover", (e) => {
  e.preventDefault();
  drop.classList.add("active");
});

drop.addEventListener("dragleave", () => drop.classList.remove("active"));

drop.addEventListener("drop", (e) => {
  e.preventDefault();
  drop.classList.remove("active");
  if (e.dataTransfer.files.length > 0) {
    handleFileRegistration(e.dataTransfer.files[0]);
  }
});

fileInput.addEventListener("change", (e) => {
  if (e.target.files.length > 0) {
    handleFileRegistration(e.target.files[0]);
  }
});

function handleFileRegistration(fileObj) {
  if (!fileObj) return;

  const fileExtension = fileObj.name.split(".").pop().toLowerCase();

  if (!allowedFormats[fileExtension]) {
    alert("Unsupported file type. Please use CSV, TXT, MD, PNG, or JPG.");
    return;
  }

  currentFile = fileObj;
  currentBlob = null;
  downloadBtn.style.display = "none";

  fileName.textContent = fileObj.name;
  fileSize.textContent = (fileObj.size / 1024).toFixed(1) + " KB";
  fileInfo.style.display = "block";

  format.innerHTML = "";
  allowedFormats[fileExtension].forEach(targetExt => {
    const optionElement = document.createElement("option");
    optionElement.value = targetExt;
    optionElement.textContent = targetExt.toUpperCase();
    format.appendChild(optionElement);
  });
}

// Konvertierungslogik
convertBtn.addEventListener("click", () => {
  if (!currentFile) {
    alert("Please upload a file first.");
    return;
  }

  const reader = new FileReader();
  const fileExtension = currentFile.name.split(".").pop().toLowerCase();
  const targetFormat = format.value;

  reader.onload = (e) => {
    if (fileExtension === "csv" && targetFormat === "json") {
      const lines = e.target.result.split("\n");
      if (lines.length > 0) {
        const headers = lines[0].split(",");
        const data = lines.slice(1).filter(line => line.trim() !== "").map(line => {
          const obj = {};
          const currentline = line.split(",");
          headers.forEach((header, index) => {
            obj[header.trim()] = currentline[index] ? currentline[index].trim() : "";
          });
          return obj;
        });
        currentBlob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      }
    } else {
      let mimeType = "text/plain";
      if (targetFormat === "html") mimeType = "text/html";
      if (targetFormat === "json") mimeType = "application/json";
      currentBlob = new Blob([e.target.result], { type: mimeType });
    }

    downloadBtn.style.display = "block";
  };

  reader.readAsText(currentFile);
});

// Download Trigger
downloadBtn.addEventListener("click", () => {
  if (!currentBlob) return;

  const downloadAnchor = document.createElement("a");
  downloadAnchor.href = URL.createObjectURL(currentBlob);
  downloadAnchor.download = `converted_${Date.now()}.${format.value}`;
  downloadAnchor.click();
  
  // Memory Cleanup
  setTimeout(() => URL.revokeObjectURL(downloadAnchor.href), 100);
});
</script>

</body>
</html>
