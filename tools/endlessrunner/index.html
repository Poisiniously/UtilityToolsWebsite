<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dino Runner</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:#f7f7f7;
  font-family:sans-serif;
}
canvas {
  display:block;
}
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:#333;
}
#gameover {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:30px;
  display:none;
}
</style>
</head>
<body>

<div id="ui">
Score: <span id="score">0</span><br>
Highscore: <span id="high">0</span>
</div>

<div id="gameover">GAME OVER<br><small>Drücke R zum Neustarten</small></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// GAME STATE
let groundY = canvas.height - 100;
let gravity = 0.6;
let velocity = 0;
let jumpForce = -12;

let dino = {
  x:100,
  y:groundY,
  w:40,
  h:40
};

let obstacles = [];
let speed = 6;
let score = 0;
let high = localStorage.high || 0;
document.getElementById("high").innerText = high;

let running = true;

// INPUT
document.addEventListener("keydown", e=>{
  if((e.key===" " || e.key==="ArrowUp") && dino.y >= groundY){
    velocity = jumpForce;
  }
  if(e.key==="r" && !running){
    restart();
  }
});

// SPAWN
function spawnObstacle(){
  obstacles.push({
    x: canvas.width,
    y: groundY,
    w: 20 + Math.random()*20,
    h: 40 + Math.random()*20
  });
}

// LOOP
function update(){
  if(!running) return;

  // PHYSICS
  velocity += gravity;
  dino.y += velocity;

  if(dino.y > groundY){
    dino.y = groundY;
    velocity = 0;
  }

  // SPAWN
  if(Math.random() < 0.02){
    spawnObstacle();
  }

  // OBSTACLES
  obstacles.forEach((o,i)=>{
    o.x -= speed;

    // COLLISION
    if(
      dino.x < o.x + o.w &&
      dino.x + dino.w > o.x &&
      dino.y < o.y + o.h &&
      dino.y + dino.h > o.y
    ){
      gameOver();
    }

    // REMOVE
    if(o.x + o.w < 0){
      obstacles.splice(i,1);
    }
  });

  // SCORE
  score++;
  document.getElementById("score").innerText = score;

  // DIFFICULTY
  speed += 0.002;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // GROUND
  ctx.fillStyle = "#333";
  ctx.fillRect(0, groundY + dino.h, canvas.width, 5);

  // DINO
  ctx.fillStyle = "#222";
  ctx.fillRect(dino.x, dino.y, dino.w, dino.h);

  // OBSTACLES
  ctx.fillStyle = "#228B22";
  obstacles.forEach(o=>{
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });
}

function gameOver(){
  running = false;
  document.getElementById("gameover").style.display = "block";

  if(score > high){
    localStorage.high = score;
  }
}

function restart(){
  obstacles = [];
  speed = 6;
  score = 0;
  velocity = 0;
  dino.y = groundY;
  running = true;
  document.getElementById("gameover").style.display = "none";
}

// MAIN LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

// RESIZE
window.addEventListener("resize", ()=>{
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  groundY = canvas.height - 100;
});
</script>

</body>
</html>
