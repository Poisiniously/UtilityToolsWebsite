<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Urban Runner 3D — Textured Endless Runner</title>
<style>
  :root{
    --bg:#07060a;
    --accent:#8a5cff;
    --accent-2:#6f3fe6;
    --ui:#0f0f12;
    --text:#eaeaf2;
  }
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#050406,#0b0b0d);color:var(--text);font-family:Inter,system-ui,Arial;}
  #container{width:100%;height:100vh;display:flex;align-items:stretch;gap:0;}
  canvas{display:block;}
  /* UI */
  .ui {
    position: absolute;
    left: 18px;
    top: 18px;
    z-index: 20;
    color:var(--text);
    display:flex;
    flex-direction:column;
    gap:8px;
    pointer-events:none;
  }
  .panel {
    background: rgba(10,10,12,0.6);
    border:1px solid rgba(138,92,255,0.12);
    padding:10px 12px;
    border-radius:10px;
    backdrop-filter: blur(6px);
    pointer-events:auto;
  }
  .title { font-weight:800; font-size:14px; color:var(--text); }
  .muted { color:#bdbdd0; font-size:12px; margin-top:4px; }
  .controls { display:flex; gap:8px; margin-top:6px; }
  .btn {
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:white;padding:8px 10px;border-radius:8px;border:none;font-weight:700;cursor:pointer;
  }
  .small { font-size:13px; color:var(--text); }
  .hint { font-size:12px; color:#bdbdd0; margin-top:6px; }
  /* bottom HUD */
  .hud {
    position: absolute;
    right: 18px;
    bottom: 18px;
    z-index:20;
    display:flex;
    gap:10px;
    align-items:center;
  }
  .score {
    background: rgba(10,10,12,0.6);
    padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);
    font-weight:800;
  }
  /* simple mobile hint */
  .mobile-hint { position:absolute; left:50%; bottom:18px; transform:translateX(-50%); color:#bdbdd0; font-size:13px; z-index:20; }
</style>
</head>
<body>
<div id="container"></div>

<div class="ui">
  <div class="panel" id="infoPanel" role="region" aria-label="Spielsteuerung">
    <div class="title">Urban Runner 3D</div>
    <div class="muted">Eigenes, texturreiches Endless Runner Demo</div>
    <div class="hint">Steuerung: ← → zum Spurwechseln, Leertaste zum Springen</div>
    <div class="controls" style="margin-top:8px;">
      <button id="startBtn" class="btn">Start</button>
      <button id="resetBtn" class="btn" style="background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--accent);">Reset</button>
    </div>
  </div>
</div>

<div class="hud">
  <div class="score panel" id="score">Score: 0</div>
</div>

<div class="mobile-hint">Tippe links/rechts oder streiche zum Steuern</div>

<!-- Three.js from CDN -->
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>
/*
  Urban Runner 3D
  - Single-file demo
  - Procedural / canvas textures for rails, ground, obstacles, player
  - Simple lane-based endless runner logic
  - Focus on textured materials and lighting
*/

/* ---------- Setup ---------- */
const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x07060a, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 6, 12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

/* ---------- Lights ---------- */
const hemi = new THREE.HemisphereLight(0x8aa0ff, 0x101018, 0.6);
scene.add(hemi);

const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(-10, 20, 10);
dir.castShadow = true;
dir.shadow.mapSize.set(2048,2048);
dir.shadow.camera.left = -30; dir.shadow.camera.right = 30; dir.shadow.camera.top = 30; dir.shadow.camera.bottom = -30;
scene.add(dir);

/* ---------- Textures (procedural via canvas) ---------- */
function createStripedTexture(width=512, height=512, colors=['#2b2b2b','#1a1a1a'], stripeCount=12){
  const c = document.createElement('canvas');
  c.width = width; c.height = height;
  const ctx = c.getContext('2d');
  // base
  ctx.fillStyle = colors[0]; ctx.fillRect(0,0,width,height);
  // stripes
  ctx.fillStyle = colors[1];
  for(let i=0;i<stripeCount;i++){
    const h = Math.floor(height/stripeCount);
    if(i%2===0) ctx.fillRect(0,i*h,width,h);
  }
  // subtle noise
  const img = ctx.getImageData(0,0,width,height);
  for(let i=0;i<img.data.length;i+=4){
    const v = (Math.random()-0.5)*8;
    img.data[i] = Math.max(0, Math.min(255, img.data[i]+v));
    img.data[i+1] = Math.max(0, Math.min(255, img.data[i+1]+v));
    img.data[i+2] = Math.max(0, Math.min(255, img.data[i+2]+v));
  }
  ctx.putImageData(img,0,0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4,4);
  tex.anisotropy = 4;
  return tex;
}

function createTileTexture(size=512, colorA='#3a3a3a', colorB='#272727'){
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = colorA; ctx.fillRect(0,0,size,size);
  ctx.fillStyle = colorB;
  ctx.fillRect(0,0,size/2,size/2);
  ctx.fillRect(size/2,size/2,size/2,size/2);
  // grout lines
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 6;
  ctx.strokeRect(0,0,size,size);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(8,8);
  tex.anisotropy = 4;
  return tex;
}

function createGraffitiTexture(text='URBAN', size=1024){
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  // background
  ctx.fillStyle = '#2b2b2b'; ctx.fillRect(0,0,size,size);
  // paint splatters
  for(let i=0;i<120;i++){
    ctx.fillStyle = `hsla(${Math.random()*360},80%,60%,${0.12+Math.random()*0.3})`;
    const r = Math.random()*60;
    ctx.beginPath();
    ctx.arc(Math.random()*size, Math.random()*size, r, 0, Math.PI*2);
    ctx.fill();
  }
  // big text
  ctx.font = 'bold 220px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const grad = ctx.createLinearGradient(0,0,size,size);
  grad.addColorStop(0,'#ff7bd6'); grad.addColorStop(0.5,'#8a5cff'); grad.addColorStop(1,'#6f3fe6');
  ctx.fillStyle = grad;
  ctx.fillText(text, size/2, size/2);
  // noise
  const img = ctx.getImageData(0,0,size,size);
  for(let i=0;i<img.data.length;i+=4){
    const v = (Math.random()-0.5)*12;
    img.data[i] = Math.max(0, Math.min(255, img.data[i]+v));
    img.data[i+1] = Math.max(0, Math.min(255, img.data[i+1]+v));
    img.data[i+2] = Math.max(0, Math.min(255, img.data[i+2]+v));
  }
  ctx.putImageData(img,0,0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1,1);
  tex.anisotropy = 8;
  return tex;
}

/* create textures */
const railTex = createStripedTexture(512,512,['#2b2b2b','#1a1a1a'],16);
const groundTex = createTileTexture(512,'#1f1f1f','#151515');
const graffitiTex = createGraffitiTexture('URBN');

/* ---------- Ground / Tracks ---------- */
const lanes = [-2.8, 0, 2.8]; // three lanes
const trackGroup = new THREE.Group();
scene.add(trackGroup);

function makeTrackSegment(z){
  const seg = new THREE.Group();
  // ground plane
  const gGeo = new THREE.PlaneGeometry(12, 20);
  const gMat = new THREE.MeshStandardMaterial({map: groundTex, roughness:0.9, metalness:0.02});
  const ground = new THREE.Mesh(gGeo, gMat);
  ground.rotation.x = -Math.PI/2;
  ground.position.z = z;
  ground.receiveShadow = true;
  seg.add(ground);

  // rails (left and right)
  const railGeo = new THREE.BoxGeometry(0.6, 0.2, 20);
  const railMat = new THREE.MeshStandardMaterial({map: railTex, roughness:0.6, metalness:0.6});
  const leftRail = new THREE.Mesh(railGeo, railMat);
  leftRail.position.set(-5.2,0.15,z);
  leftRail.castShadow = true;
  seg.add(leftRail);
  const rightRail = leftRail.clone();
  rightRail.position.x = 5.2;
  seg.add(rightRail);

  // graffiti wall behind rails
  const wallGeo = new THREE.BoxGeometry(12, 4, 0.6);
  const wallMat = new THREE.MeshStandardMaterial({map: graffitiTex, roughness:0.8});
  const wall = new THREE.Mesh(wallGeo, wallMat);
  wall.position.set(0,2.0,z-9.6);
  wall.receiveShadow = true;
  seg.add(wall);

  return seg;
}

/* create initial segments */
const segments = [];
for(let i=0;i<6;i++){
  const s = makeTrackSegment(-i*20);
  trackGroup.add(s);
  segments.push(s);
}

/* ---------- Player ---------- */
const player = new THREE.Group();
const bodyGeo = new THREE.BoxGeometry(0.9,1.6,0.6);
const bodyMat = new THREE.MeshStandardMaterial({color:0x8a5cff, roughness:0.4, metalness:0.1});
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 1.0;
body.castShadow = true;
player.add(body);

// head (textured cap)
const headGeo = new THREE.BoxGeometry(0.9,0.9,0.9);
const headMat = new THREE.MeshStandardMaterial({color:0x222222, roughness:0.6});
const head = new THREE.Mesh(headGeo, headMat);
head.position.y = 2.0;
head.castShadow = true;
player.add(head);

// board under feet
const boardGeo = new THREE.BoxGeometry(1.6,0.08,0.4);
const boardMat = new THREE.MeshStandardMaterial({color:0x222222, roughness:0.5, metalness:0.2});
const board = new THREE.Mesh(boardGeo, boardMat);
board.position.y = 0.5;
board.castShadow = true;
player.add(board);

player.position.set(0,0,6);
scene.add(player);

/* ---------- Obstacles ---------- */
const obstacles = [];
function spawnObstacle(z){
  const laneIndex = Math.floor(Math.random()*lanes.length);
  const x = lanes[laneIndex];
  const geo = new THREE.BoxGeometry(1.2,1.2,1.2);
  const mat = new THREE.MeshStandardMaterial({color:0xff7b7b, roughness:0.7});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x,0.6,z);
  mesh.castShadow = true;
  scene.add(mesh);
  obstacles.push({mesh, lane:laneIndex});
}

/* spawn some initial obstacles */
for(let i=0;i<8;i++){
  spawnObstacle(-10 - i*8 - Math.random()*8);
}

/* ---------- Game state ---------- */
let speed = 0.18; // forward speed
let distance = 0;
let score = 0;
let lane = 1; // start center
let targetX = lanes[lane];
let vy = 0;
let onGround = true;
let running = false;

/* UI elements */
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const scoreEl = document.getElementById('score');

startBtn.addEventListener('click', ()=> {
  running = true;
  startBtn.textContent = 'Running';
  startBtn.disabled = true;
});
resetBtn.addEventListener('click', resetGame);

function resetGame(){
  // reset state
  running = false;
  startBtn.textContent = 'Start';
  startBtn.disabled = false;
  distance = 0; score = 0; speed = 0.18;
  lane = 1; targetX = lanes[lane];
  player.position.set(0,0,6);
  obstacles.forEach(o=> { scene.remove(o.mesh); });
  obstacles.length = 0;
  for(let i=0;i<8;i++) spawnObstacle(-10 - i*8 - Math.random()*8);
  scoreEl.textContent = 'Score: 0';
}

/* ---------- Input ---------- */
window.addEventListener('keydown', (e)=>{
  if(e.code === 'ArrowLeft') moveLeft();
  if(e.code === 'ArrowRight') moveRight();
  if(e.code === 'Space') jump();
});
let touchStartX = null;
window.addEventListener('touchstart', (e)=>{
  touchStartX = e.touches[0].clientX;
});
window.addEventListener('touchend', (e)=>{
  if(touchStartX === null) return;
  const dx = (e.changedTouches[0].clientX - touchStartX);
  if(Math.abs(dx) > 40){
    if(dx < 0) moveLeft(); else moveRight();
  } else {
    jump();
  }
  touchStartX = null;
});

function moveLeft(){
  lane = Math.max(0, lane-1);
  targetX = lanes[lane];
}
function moveRight(){
  lane = Math.min(lanes.length-1, lane+1);
  targetX = lanes[lane];
}
function jump(){
  if(onGround){
    vy = 0.28;
    onGround = false;
  }
}

/* ---------- Collision ---------- */
function checkCollisions(){
  for(let i=obstacles.length-1;i>=0;i--){
    const o = obstacles[i];
    const dz = o.mesh.position.z - player.position.z;
    if(Math.abs(dz) < 1.0 && Math.abs(o.mesh.position.x - player.position.x) < 0.9){
      // collision
      running = false;
      startBtn.textContent = 'Start';
      startBtn.disabled = false;
      // small bounce
      vy = 0.18;
      // mark obstacle removed
      scene.remove(o.mesh);
      obstacles.splice(i,1);
      // penalty
      score = Math.max(0, score - 50);
      scoreEl.textContent = 'Score: ' + score;
    }
  }
}

/* ---------- Animation loop ---------- */
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());

  // camera slight follow
  camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 6.0, player.position.z + 12), 0.08);
  camera.lookAt(player.position.x, player.position.y + 1.2, player.position.z - 4);

  if(running){
    // move world: advance segments and obstacles towards player
    distance += speed * 60 * dt;
    score = Math.floor(distance);
    scoreEl.textContent = 'Score: ' + score;

    // move segments
    trackGroup.children.forEach((seg)=>{
      seg.position.z += speed * 60 * dt;
      if(seg.position.z > 20){
        // recycle to back
        seg.position.z -= 6*20;
      }
    });

    // move obstacles
    for(let i=obstacles.length-1;i>=0;i--){
      const o = obstacles[i];
      o.mesh.position.z += speed * 60 * dt;
      if(o.mesh.position.z > 12){
        // remove and spawn new
        scene.remove(o.mesh);
        obstacles.splice(i,1);
        spawnObstacle(-120 - Math.random()*40);
      }
    }

    // gradually increase speed
    speed += 0.00002 * dt * 60;
  }

  // player lateral smoothing
  player.position.x += (targetX - player.position.x) * 0.18;

  // jumping physics
  if(!onGround){
    vy -= 0.018 * 60 * dt;
    player.position.y += vy;
    if(player.position.y <= 0){
      player.position.y = 0;
      vy = 0;
      onGround = true;
    }
  }

  // subtle board tilt
  board.rotation.z = (player.position.x - targetX) * 0.08;

  // check collisions
  if(running) checkCollisions();

  renderer.render(scene, camera);
}
animate();

/* ---------- Resize ---------- */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ---------- Accessibility / quick start ---------- */
document.addEventListener('visibilitychange', ()=> {
  if(document.hidden) running = false;
});

/* ---------- Notes ----------
 - Textures are procedural canvas textures embedded in this file.
 - This is a compact demo focusing on textured materials, lighting and simple gameplay.
 - You can extend: add particle effects, animated obstacles, collectible coins, improved collision shapes, sound, or better character models.
--------------------------------- */
</script>
</body>
</html>
