<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Surfers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #00ffcc;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            border: 4px solid #00ffcc;
            box-shadow: 0 0 30px #00ffcc;
            background: #111;
        }
        
        canvas {
            display: block;
            background: #1a0033;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        
        .score {
            font-size: 24px;
            text-shadow: 0 0 10px #00ffcc;
        }
        
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 4px solid #ff00aa;
            text-align: center;
            display: none;
            z-index: 20;
        }
        
        button {
            background: #ff00aa;
            color: white;
            border: none;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 20px #ff00aa;
        }
        
        button:hover {
            background: #ff66cc;
        }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            text-align: center;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="500"></canvas>
        
        <div id="ui">
            <div class="score">SCORE: <span id="score">0</span></div>
            <div class="score">HIGH: <span id="highscore">0</span></div>
        </div>
        
        <div id="game-over">
            <h1>GAME OVER</h1>
            <p>SCORE: <span id="final-score">0</span></p>
            <button onclick="restartGame()">RESTART</button>
        </div>
        
        <div class="instructions">
            ← → : SPUREN WECHSELN<br>
            LEERTASTE / ↑ : SPRINGEN
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = true;
        let score = 0;
        let highscore = localStorage.getItem('shadowSurfersHigh') || 0;
        let speed = 6;
        let gravity = 0.8;
        let lanes = [200, 400, 600];
        
        let player = {
            lane: 1,
            x: lanes[1],
            y: 350,
            width: 50,
            height: 80,
            vy: 0,
            jumping: false
        };
        
        let obstacles = [];
        let coins = [];
        let particles = [];
        let bgOffset = 0;
        
        document.getElementById('highscore').textContent = highscore;
        
        let keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if ((e.key === ' ' || e.key === 'ArrowUp') && !player.jumping && gameRunning) {
                player.vy = -18;
                player.jumping = true;
            }
        });
        
        window.addEventListener('keyup', e => keys[e.key] = false);
        
        function changeLane(direction) {
            if (!gameRunning) return;
            let newLane = player.lane + direction;
            if (newLane >= 0 && newLane <= 2) {
                player.lane = newLane;
                player.x = lanes[newLane];
            }
        }
        
        function spawnObstacle() {
            if (Math.random() < 0.03) {
                const lane = Math.floor(Math.random() * 3);
                obstacles.push({
                    x: lanes[lane],
                    y: -100,
                    width: 60,
                    height: 80,
                    type: Math.random() > 0.5 ? 'train' : 'barrier'
                });
            }
        }
        
        function spawnCoin() {
            if (Math.random() < 0.04) {
                const lane = Math.floor(Math.random() * 3);
                coins.push({
                    x: lanes[lane] + 10,
                    y: Math.random() * 200 + 50,
                    width: 30,
                    height: 30,
                    collected: false
                });
            }
        }
        
        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.random() * 8 - 4,
                    vy: Math.random() * 8 - 6,
                    life: 30,
                    color: color
                });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            
            speed = Math.min(12, 6 + Math.floor(score / 800));
            
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) { changeLane(-1); keys['ArrowLeft'] = false; }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) { changeLane(1); keys['ArrowRight'] = false; }
            
            if (player.jumping) {
                player.vy += gravity;
                player.y += player.vy;
                if (player.y >= 350) {
                    player.y = 350;
                    player.vy = 0;
                    player.jumping = false;
                }
            }
            
            // Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += speed;
                
                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    gameOver();
                    return;
                }
                
                if (obs.y > 600) {
                    obstacles.splice(i, 1);
                    score += 10;
                }
            }
            
            // Coins
            for (let i = coins.length - 1; i >= 0; i--) {
                let coin = coins[i];
                coin.y += speed;
                
                if (
                    !coin.collected &&
                    Math.abs(player.x + player.width/2 - coin.x) < 40 &&
                    Math.abs(player.y + player.height/2 - coin.y) < 40
                ) {
                    coin.collected = true;
                    score += 50;
                    createParticles(coin.x, coin.y, '#ffff00');
                }
                
                if (coin.y > 600 || coin.collected) coins.splice(i, 1);
            }
            
            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            spawnObstacle();
            spawnCoin();
            score += 1;
            document.getElementById('score').textContent = Math.floor(score);
            
            bgOffset += speed * 0.6;
            if (bgOffset > 100) bgOffset = 0;
        }
        
        function drawBackground() {
            ctx.fillStyle = '#1a0033';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 4;
            for (let i = -2; i < 12; i++) {
                let y = (i * 80 + bgOffset) % 700 - 100;
                ctx.beginPath();
                ctx.moveTo(100, y);
                ctx.lineTo(700, y);
                ctx.stroke();
            }
            
            ctx.strokeStyle = '#ff00aa';
            ctx.lineWidth = 8;
            ctx.setLineDash([20, 40]);
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(lanes[i] - 30, 0);
                ctx.lineTo(lanes[i] - 30, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#220044';
            ctx.fillRect(0, 0, 120, canvas.height);
            ctx.fillRect(680, 0, 120, canvas.height);
            
            ctx.strokeStyle = '#6600ff';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(120, 0);
            ctx.lineTo(120, canvas.height);
            ctx.moveTo(680, 0);
            ctx.lineTo(680, canvas.height);
            ctx.stroke();
        }
        
        function drawPlayer() {
            ctx.fillStyle = '#00ffcc';
            ctx.fillRect(player.x + 10, player.y + 10, player.width - 20, player.height - 30);
            
            ctx.fillStyle = '#ff99ff';
            ctx.beginPath();
            ctx.arc(player.x + player.width/2, player.y + 30, 18, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x + player.width/2 - 8, player.y + 25, 6, 6);
            ctx.fillRect(player.x + player.width/2 + 2, player.y + 25, 6, 6);
            
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(player.x + 20, player.y + 65);
            ctx.lineTo(player.x + 25, player.y + 85);
            ctx.moveTo(player.x + player.width - 20, player.y + 65);
            ctx.lineTo(player.x + player.width - 15, player.y + 85);
            ctx.stroke();
            
            ctx.fillStyle = '#ff00aa';
            ctx.fillRect(player.x + 15, player.y + 82, 18, 8);
            ctx.fillRect(player.x + player.width - 33, player.y + 82, 18, 8);
        }
        
        function drawObstacle(obs) {
            if (obs.type === 'train') {
                ctx.fillStyle = '#9900cc';
                ctx.fillRect(obs.x - 10, obs.y, obs.width + 20, obs.height);
                ctx.fillStyle = '#ff00aa';
                ctx.fillRect(obs.x, obs.y + 10, obs.width, 20);
            } else {
                ctx.fillStyle = '#ff6600';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(obs.x + 10, obs.y + 20, obs.width - 20, 15);
            }
        }
        
        function drawCoin(coin) {
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ccaa00';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('$', coin.x, coin.y + 7);
        }
        
        function drawParticles() {
            for (let p of particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 6, 6);
            }
            ctx.globalAlpha = 1;
        }
        
        function draw() {
            drawBackground();
            coins.forEach(c => !c.collected && drawCoin(c));
            obstacles.forEach(drawObstacle);
            drawPlayer();
            drawParticles();
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameRunning = false;
            createParticles(player.x + player.width/2, player.y + 40, '#ff0066');
            
            if (score > highscore) {
                highscore = Math.floor(score);
                localStorage.setItem('shadowSurfersHigh', highscore);
                document.getElementById('highscore').textContent = highscore;
            }
            
            document.getElementById('final-score').textContent = Math.floor(score);
            document.getElementById('game-over').style.display = 'block';
        }
        
        function restartGame() {
            obstacles = [];
            coins = [];
            particles = [];
            score = 0;
            speed = 6;
            player.y = 350;
            player.vy = 0;
            player.jumping = false;
            player.lane = 1;
            player.x = lanes[1];
            
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('score').textContent = '0';
            gameRunning = true;
        }
        
        gameLoop();
        
        // Touch Support
        let touchStartX = 0;
        canvas.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        canvas.addEventListener('touchend', e => {
            if (!gameRunning) return;
            let touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) changeLane(-1);
            if (touchEndX > touchStartX + 50) changeLane(1);
        });
    </script>
</body>
</html>
