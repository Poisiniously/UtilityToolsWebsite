<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>3D Endless Runner</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  #ui {
    position:absolute;
    top:10px; left:10px;
    color:white;
    font-family:sans-serif;
    font-size:20px;
  }
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Licht
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// Spieler
let player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0x00ffcc})
);
player.position.y = 0.5;
scene.add(player);

let lanes = [-2,0,2];
let currentLane = 1;

// Boden
let ground = [];
for(let i=0;i<50;i++){
  let tile = new THREE.Mesh(
    new THREE.BoxGeometry(6,0.1,5),
    new THREE.MeshStandardMaterial({color:0x222222})
  );
  tile.position.z = i*5;
  scene.add(tile);
  ground.push(tile);
}

// Hindernisse
let obstacles = [];
function spawnObstacle(z){
  let obs = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xff3333})
  );
  let lane = Math.floor(Math.random()*3);
  obs.position.set(lanes[lane],0.5,z);
  scene.add(obs);
  obstacles.push(obs);
}

// Kamera
camera.position.set(0,3,-6);
camera.lookAt(0,0,5);

// Steuerung
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft" && currentLane>0) currentLane--;
  if(e.key==="ArrowRight" && currentLane<2) currentLane++;
  if(e.key===" " && player.position.y<=0.5){
    velocityY = 0.15;
  }
});

// Physik
let velocityY = 0;
let gravity = -0.008;

// Game loop
let speed = 0.2;
let score = 0;

function animate(){
  requestAnimationFrame(animate);

  // Bewegung
  player.position.x += (lanes[currentLane]-player.position.x)*0.2;

  // Springen
  velocityY += gravity;
  player.position.y += velocityY;
  if(player.position.y < 0.5){
    player.position.y = 0.5;
    velocityY = 0;
  }

  // Boden bewegen
  ground.forEach(tile=>{
    tile.position.z -= speed;
    if(tile.position.z < -5){
      tile.position.z += 250;
    }
  });

  // Hindernisse
  if(Math.random()<0.02){
    spawnObstacle(100);
  }

  obstacles.forEach((obs,i)=>{
    obs.position.z -= speed;

    // Kollision
    if(
      Math.abs(obs.position.z - player.position.z) < 1 &&
      Math.abs(obs.position.x - player.position.x) < 1 &&
      player.position.y < 1
    ){
      alert("Game Over! Score: "+score);
      location.reload();
    }

    if(obs.position.z < -10){
      scene.remove(obs);
      obstacles.splice(i,1);
    }
  });

  // Score
  score++;
  document.getElementById("score").innerText = score;

  // Schwierigkeit
  speed += 0.00002;

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
