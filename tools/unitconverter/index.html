<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Einfacher Unit Converter — Schwarz & Lila</title>
<style>
  :root{
    --bg:#070707;
    --panel:#0d0d0d;
    --accent:#8a5cff;
    --accent-2:#6f3fe6;
    --glass: rgba(255,255,255,0.03);
    --text:#eaeaf2;
    --sub:#bdbdd0;
    --shadow: 0 12px 40px rgba(0,0,0,0.7);
    font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }

  html,body{ height:100%; margin:0; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

  /* Centered container */
  .wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  /* Card */
  .card{
    width:920px;
    max-width:100%;
    border-radius:14px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    box-shadow:var(--shadow);
    overflow:hidden;
    display:grid;
    grid-template-columns: 1fr 360px;
    gap:0;
    border:1px solid rgba(255,255,255,0.03);
  }

  /* Left: main simple UI */
  .main{
    padding:28px;
    background:var(--panel);
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .brand{
    display:flex;
    gap:12px;
    align-items:center;
  }
  .logo{
    width:56px;height:56px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:20px;
    box-shadow:0 8px 30px rgba(111,63,230,0.14);
  }
  .title{ font-size:18px; font-weight:700; color:var(--text); }
  .subtitle{ color:var(--sub); font-size:13px; }

  /* Big input area */
  .input-area{
    display:flex;
    gap:12px;
    align-items:center;
  }
  .value-input{
    flex:1;
    display:flex;
    gap:10px;
    align-items:center;
  }
  input[type="number"]{
    width:100%;
    padding:18px 16px;
    border-radius:12px;
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.03);
    color:var(--text);
    font-size:20px;
    outline:none;
    box-shadow: inset 0 -6px 18px rgba(0,0,0,0.6);
  }
  .unit-select{
    width:160px;
    padding:12px 10px;
    border-radius:12px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.03);
    color:var(--text);
    font-size:15px;
  }

  /* Convert button large */
  .convert-row{
    display:flex;
    gap:12px;
    align-items:center;
  }
  .btn{
    padding:14px 18px;
    border-radius:12px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:white;
    font-weight:700;
    border:none;
    cursor:pointer;
    box-shadow: 0 10px 30px rgba(111,63,230,0.14);
    font-size:15px;
  }
  .btn.secondary{
    background:transparent;
    border:1px solid rgba(255,255,255,0.04);
    color:var(--accent);
    font-weight:700;
  }

  /* Result */
  .result{
    margin-top:6px;
    padding:18px;
    border-radius:12px;
    background:linear-gradient(90deg, rgba(138,92,255,0.03), transparent);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    border:1px solid rgba(255,255,255,0.02);
  }
  .result .big{
    font-size:28px;
    font-weight:800;
    color:var(--text);
  }
  .result .small{
    color:var(--sub);
    font-size:13px;
  }

  /* Right: presets & history */
  .side{
    padding:22px;
    background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);
    display:flex;
    flex-direction:column;
    gap:14px;
    border-left:1px solid rgba(255,255,255,0.02);
  }
  .section-title{ color:var(--sub); font-size:13px; margin-bottom:6px; }
  .preset-grid{ display:flex; flex-direction:column; gap:8px; }
  .preset{ padding:10px 12px; border-radius:10px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.02); cursor:pointer; color:var(--text); font-weight:700; text-align:left; }
  .history{ display:flex; flex-direction:column; gap:8px; max-height:260px; overflow:auto; padding-right:6px; }
  .hist-item{ padding:10px 12px; border-radius:10px; background:transparent; border:1px dashed rgba(255,255,255,0.02); color:var(--sub); font-size:13px; cursor:pointer; }

  /* small helpers */
  .muted{ color:var(--sub); font-size:13px; }
  .hint{ font-size:13px; color:var(--sub); }

  /* responsive */
  @media (max-width:880px){
    .card{ grid-template-columns: 1fr; }
    .side{ order:2; border-left:none; border-top:1px solid rgba(255,255,255,0.02); }
  }

  /* subtle animations */
  input[type="number"]:focus, .unit-select:focus{ box-shadow: 0 8px 30px rgba(138,92,255,0.12); transform:translateY(-2px); }
  .preset:hover, .hist-item:hover{ transform:translateY(-4px); transition:transform .18s; box-shadow:0 10px 30px rgba(0,0,0,0.6); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card" role="application" aria-label="Einfacher Unit Converter">
    <div class="main">
      <div class="brand">
        <div class="logo">UC</div>
        <div>
          <div class="title">Unit Converter</div>
          <div class="subtitle">Extrem einfach zu bedienen — Schwarz mit lila Akzenten</div>
        </div>
      </div>

      <!-- Category selector simplified -->
      <div>
        <label class="muted" for="category">Kategorie</label>
        <select id="category" class="unit-select" aria-label="Kategorie auswählen"></select>
      </div>

      <!-- Big input row -->
      <div class="input-area">
        <div class="value-input">
          <input id="value" type="number" step="any" value="1" aria-label="Wert eingeben" />
          <select id="fromUnit" class="unit-select" aria-label="Von Einheit"></select>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
          <button id="swap" class="btn secondary" title="Tauschen" aria-label="Tauschen">⇄</button>
        </div>
        <div style="width:160px;">
          <select id="toUnit" class="unit-select" aria-label="Nach Einheit"></select>
        </div>
      </div>

      <!-- Convert button and auto-convert toggle -->
      <div class="convert-row">
        <button id="convert" class="btn">Konvertieren</button>
        <button id="clear" class="btn secondary">Zurücksetzen</button>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
          <label class="muted" for="auto">Auto</label>
          <input id="auto" type="checkbox" aria-label="Automatisch konvertieren" checked />
        </div>
      </div>

      <!-- Result -->
      <div class="result" id="resultCard" aria-live="polite">
        <div>
          <div class="big" id="resultValue">—</div>
          <div class="small" id="resultDetail">—</div>
        </div>
        <div style="text-align:right">
          <div class="muted">Genauigkeit</div>
          <select id="precision" class="unit-select" aria-label="Genauigkeit">
            <option value="4" selected>4 Dez.</option>
            <option value="2">2 Dez.</option>
            <option value="0">Ganzzahl</option>
          </select>
        </div>
      </div>

      <div class="hint">Tipp: Tippe Wert ein — bei aktiviertem "Auto" wird sofort konvertiert.</div>
    </div>

    <div class="side" aria-hidden="false">
      <div>
        <div class="section-title">Schnellvorlagen</div>
        <div class="preset-grid" id="presets">
          <!-- presets populated by JS -->
        </div>
      </div>

      <div>
        <div class="section-title">Verlauf</div>
        <div class="history" id="history" aria-label="Verlauf">
          <!-- history items -->
        </div>
      </div>

      <div style="margin-top:auto">
        <div class="muted" style="font-size:12px">Version 1.1 • Einfach</div>
      </div>
    </div>
  </div>
</div>

<script>
/* -------------------------
   Vereinfachte Unit-Logik
   ------------------------- */

const categories = {
  "Länge": { base:"m", units: { "m":1, "km":1000, "cm":0.01, "mm":0.001, "mi":1609.344, "ft":0.3048, "in":0.0254 } },
  "Masse": { base:"kg", units: { "kg":1, "g":0.001, "mg":1e-6, "lb":0.45359237, "oz":0.028349523125 } },
  "Volumen": { base:"L", units: { "L":1, "mL":0.001, "m³":1000, "cup":0.24, "gal":3.785411784 } },
  "Zeit": { base:"s", units: { "s":1, "min":60, "h":3600, "d":86400 } },
  "Daten": { base:"B", units: { "B":1, "KB":1024, "MB":1024**2, "GB":1024**3 } },
  "Temperatur": { special:true, units: { "K":"K", "°C":"C", "°F":"F" } }
};

/* DOM */
const categoryEl = document.getElementById('category');
const fromEl = document.getElementById('fromUnit');
const toEl = document.getElementById('toUnit');
const valueEl = document.getElementById('value');
const convertBtn = document.getElementById('convert');
const swapBtn = document.getElementById('swap');
const clearBtn = document.getElementById('clear');
const autoEl = document.getElementById('auto');
const resultValueEl = document.getElementById('resultValue');
const resultDetailEl = document.getElementById('resultDetail');
const precisionEl = document.getElementById('precision');
const presetsEl = document.getElementById('presets');
const historyEl = document.getElementById('history');

/* Populate category and units */
function init(){
  categoryEl.innerHTML = '';
  Object.keys(categories).forEach((k, i) => {
    const o = document.createElement('option');
    o.value = k; o.textContent = k;
    categoryEl.appendChild(o);
  });
  categoryEl.value = Object.keys(categories)[0];
  populateUnits(categoryEl.value);
  buildPresets();
  doConvert(true);
}
function populateUnits(cat){
  fromEl.innerHTML = ''; toEl.innerHTML = '';
  const c = categories[cat];
  if(c.special){
    Object.keys(c.units).forEach(u=>{
      const o1 = document.createElement('option'); o1.value = u; o1.textContent = u; fromEl.appendChild(o1);
      const o2 = o1.cloneNode(true); toEl.appendChild(o2);
    });
  } else {
    Object.keys(c.units).forEach(u=>{
      const o1 = document.createElement('option'); o1.value = u; o1.textContent = u; fromEl.appendChild(o1);
      const o2 = o1.cloneNode(true); toEl.appendChild(o2);
    });
  }
  fromEl.value = fromEl.options[0]?.value || '';
  toEl.value = toEl.options[1]?.value || fromEl.value;
}

/* Temperature helpers */
function tempToK(v, unit){
  if(unit === "K") return Number(v);
  if(unit === "°C") return Number(v) + 273.15;
  if(unit === "°F") return (Number(v) - 32) * 5/9 + 273.15;
  return Number(v);
}
function kToTemp(k, unit){
  if(unit === "K") return k;
  if(unit === "°C") return k - 273.15;
  if(unit === "°F") return (k - 273.15) * 9/5 + 32;
  return k;
}

/* Convert */
function convert(cat, from, to, val){
  if(categories[cat].special){
    const k = tempToK(val, from);
    return kToTemp(k, to);
  } else {
    const c = categories[cat];
    const fromF = c.units[from];
    const toF = c.units[to];
    return Number(val) * fromF / toF;
  }
}

/* Simple animate number (fade) */
function showResult(raw){
  const prec = Number(precisionEl.value);
  const formatted = Number(raw).toLocaleString('de-DE', {maximumFractionDigits:prec});
  resultValueEl.style.opacity = 0;
  setTimeout(()=> {
    resultValueEl.textContent = formatted;
    resultValueEl.style.opacity = 1;
  }, 120);
}

/* History */
let history = [];
function pushHistory(item){
  history.unshift(item);
  if(history.length > 8) history.pop();
  renderHistory();
}
function renderHistory(){
  historyEl.innerHTML = '';
  history.forEach(h=>{
    const d = document.createElement('div');
    d.className = 'hist-item';
    d.textContent = `${h.input} ${h.from} → ${h.output} ${h.to} (${h.cat})`;
    d.addEventListener('click', ()=> {
      categoryEl.value = h.cat;
      populateUnits(h.cat);
      fromEl.value = h.from;
      toEl.value = h.to;
      valueEl.value = h.input;
      doConvert(true);
    });
    historyEl.appendChild(d);
  });
}

/* Presets */
const presetList = [
  {label:"km → m", cat:"Länge", from:"km", to:"m", val:1},
  {label:"kg → g", cat:"Masse", from:"kg", to:"g", val:1},
  {label:"°C → °F", cat:"Temperatur", from:"°C", to:"°F", val:20},
  {label:"GB → MB", cat:"Daten", from:"GB", to:"MB", val:1}
];
function buildPresets(){
  presetsEl.innerHTML = '';
  presetList.forEach(p=>{
    const b = document.createElement('div');
    b.className = 'preset';
    b.textContent = p.label;
    b.addEventListener('click', ()=>{
      categoryEl.value = p.cat;
      populateUnits(p.cat);
      fromEl.value = p.from;
      toEl.value = p.to;
      valueEl.value = p.val;
      doConvert();
    });
    presetsEl.appendChild(b);
  });
}

/* Main convert flow */
function doConvert(skipHistory){
  const cat = categoryEl.value;
  const from = fromEl.value;
  const to = toEl.value;
  const val = Number(valueEl.value);
  if(isNaN(val)){ resultValueEl.textContent = '—'; resultDetailEl.textContent = 'Ungültiger Wert'; return; }
  const raw = convert(cat, from, to, val);
  showResult(raw);
  resultDetailEl.textContent = `${val} ${from} → ${to}`;
  if(!skipHistory){
    pushHistory({cat, from, to, input:val, output: Number(raw).toLocaleString('de-DE', {maximumFractionDigits:Number(precisionEl.value)})});
  }
}

/* Events */
convertBtn.addEventListener('click', ()=> doConvert());
swapBtn.addEventListener('click', ()=>{
  const a = fromEl.value; fromEl.value = toEl.value; toEl.value = a;
  doConvert();
});
clearBtn.addEventListener('click', ()=>{
  valueEl.value = 1;
  doConvert(true);
});
categoryEl.addEventListener('change', ()=> { populateUnits(categoryEl.value); doConvert(true); });
precisionEl.addEventListener('change', ()=> doConvert(true));
valueEl.addEventListener('input', ()=> { if(autoEl.checked) doConvert(); });
fromEl.addEventListener('change', ()=> { if(autoEl.checked) doConvert(); });
toEl.addEventListener('change', ()=> { if(autoEl.checked) doConvert(); });

/* Keyboard: Enter to convert */
valueEl.addEventListener('keydown', (e)=> { if(e.key === 'Enter') doConvert(); });

/* Initialize UI */
init();

/* Pre-fill a few history items */
pushHistory({cat:"Länge", from:"km", to:"m", input:1, output:"1000"});
pushHistory({cat:"Temperatur", from:"°C", to:"°F", input:20, output:"68"});
pushHistory({cat:"Daten", from:"GB", to:"MB", input:1, output:"1024"});

</script>
</body>
</html>
