<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Premium Unit Converter — Schwarz & Lila</title>
<style>
  :root {
    --bg: #050508;
    --panel: #0d0d12;
    --border: #1c1926;
    --accent: #8a5cff;
    --accent-2: #6f3fe6;
    --accent-glow: rgba(138, 92, 255, 0.25);
    --glass: rgba(255, 255, 255, 0.02);
    --text: #eaeaf2;
    --sub: #8e8eab;
    --shadow: 0 20px 50px rgba(0,0,0,0.8);
    font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* Dark-Mode für Systemkomponenten erzwingen */
  html {
    color-scheme: dark;
  }

  html, body { 
    height: 100%; 
    margin: 0; 
    background: var(--bg); 
    color: var(--text); 
    -webkit-font-smoothing: antialiased; 
    -moz-osx-font-smoothing: grayscale; 
    overflow: hidden; 
  }

  /* Globale Custom Dark Scrollbar für Container */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg);
  }
  ::-webkit-scrollbar-thumb {
    background: #221f30;
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }

  /* Zentrierter Wrapper */
  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
  }

  /* Card */
  .card {
    width: 940px;
    max-width: 100%;
    border-radius: 16px;
    background: var(--panel);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 0;
    border: 1px solid var(--border);
  }

  /* Linke Seite: Haupt-UI */
  .main {
    padding: 32px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .brand {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .logo {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 20px;
    box-shadow: 0 8px 24px var(--accent-glow);
  }
  .title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .subtitle { color: var(--sub); font-size: 13px; margin-top: 2px; }

  /* Grid für Inputs */
  .input-area {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .value-input {
    flex: 1;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  
  .input-wrapper {
    position: relative;
    width: 100%;
    display: flex;
    align-items: center;
  }

  input[type="number"] {
    width: 100%;
    padding: 16px;
    padding-right: 40px; /* Platz für das Kreuz */
    border-radius: 12px;
    background: #060609;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    outline: none;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
    transition: all 0.2s ease;
    box-sizing: border-box;
  }

  .clear-icon {
    position: absolute;
    right: 12px;
    background: transparent;
    border: none;
    color: var(--sub);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    transition: color 0.2s ease;
  }
  
  .clear-icon:hover {
    color: var(--accent);
  }
  
  .unit-select {
    width: 160px;
    padding: 16px 12px;
    border-radius: 12px;
    background: #111017;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    outline: none;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  /* Swap Button */
  .btn {
    padding: 14px 24px;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: white;
    font-weight: 700;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 20px var(--accent-glow);
    font-size: 15px;
    transition: all 0.2s ease;
  }
  .btn.secondary {
    background: #111017;
    border: 1px solid var(--border);
    color: var(--accent);
    box-shadow: none;
  }
  .btn.secondary:hover {
    background: #161420;
    border-color: var(--accent);
    color: #a480ff;
  }

  /* Ergebnis-Box */
  .result {
    margin-top: 6px;
    padding: 20px;
    border-radius: 14px;
    background: linear-gradient(90deg, rgba(138,92,255,0.04), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border: 1px solid rgba(138, 92, 255, 0.1);
  }
  .result .big {
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    transition: opacity 0.12s ease;
  }
  .result .small {
    color: var(--sub);
    font-size: 13px;
    margin-top: 4px;
  }

  /* Rechte Seite: Sidebar */
  .side {
    padding: 28px;
    background: #09090d;
    display: flex;
    flex-direction: column;
    gap: 20px;
    border-left: 1px solid var(--border);
  }
  .section-title { color: var(--sub); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .preset-grid { display: flex; flex-direction: column; gap: 8px; }
  
  .preset { 
    padding: 12px; 
    border-radius: 10px; 
    background: #111017; 
    border: 1px solid var(--border); 
    cursor: pointer; 
    color: var(--text); 
    font-weight: 600; 
    text-align: left; 
    transition: all 0.2s ease;
  }
  .preset:hover {
    border-color: var(--accent);
    background: #161420;
    transform: translateX(4px);
  }

  .history { 
    display: flex; 
    flex-direction: column; 
    gap: 8px; 
    max-height: 220px; 
    overflow-y: auto; 
    padding-right: 4px; 
  }
  .hist-item { 
    padding: 12px; 
    border-radius: 10px; 
    background: transparent; 
    border: 1px dashed var(--border); 
    color: var(--sub); 
    font-size: 13px; 
    cursor: pointer; 
    transition: all 0.2s ease;
  }
  .hist-item:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(138, 92, 255, 0.02);
  }

  .muted { color: var(--sub); font-size: 13px; }

  /* Fokus-Effekte */
  input[type="number"]:focus, .unit-select:focus { 
    border-color: var(--accent); 
    box-shadow: 0 0 12px var(--accent-glow); 
  }

  /* Responsive Anpassungen */
  @media (max-width:880px) {
    html, body {
      overflow: auto;
    }
    .wrap {
      padding: 12px;
    }
    .card { 
      grid-template-columns: 1fr; 
    }
    .side { 
      order: 2; 
      border-left: none; 
      border-top: 1px solid var(--border); 
    }
    .input-area {
      flex-direction: column;
      align-items: stretch;
    }
    .unit-select {
      width: 100%;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card" role="application" aria-label="Einfacher Unit Converter">
    <div class="main">
      <div class="brand">
        <div class="logo">UC</div>
        <div>
          <div class="title">Unit Converter</div>
          <div class="subtitle">Extrem einfach zu bedienen — Premium Dark Design</div>
        </div>
      </div>

      <div>
        <label class="muted" style="display:block; margin-bottom:8px;" for="category">Kategorie</label>
        <select id="category" class="unit-select" style="width:100%;" aria-label="Kategorie auswählen"></select>
      </div>

      <div class="input-area">
        <div class="value-input">
          <div class="input-wrapper">
            <input id="value" type="number" step="any" value="1" aria-label="Wert eingeben" />
            <button id="clearInput" class="clear-icon" aria-label="Eingabe löschen" title="Löschen">✕</button>
          </div>
          <select id="fromUnit" class="unit-select" aria-label="Von Einheit"></select>
        </div>
        <div style="display:flex; justify-content:center;">
          <button id="swap" class="btn secondary" style="padding: 16px 20px;" title="Tauschen" aria-label="Tauschen">⇄</button>
        </div>
        <div>
          <select id="toUnit" class="unit-select" aria-label="Nach Einheit"></select>
        </div>
      </div>

      <div class="result" id="resultCard" aria-live="polite">
        <div>
          <div class="big" id="resultValue">—</div>
          <div class="small" id="resultDetail">—</div>
        </div>
        <div style="text-align:right">
          <div class="muted" style="margin-bottom:6px;">Genauigkeit</div>
          <select id="precision" class="unit-select" style="padding: 8px 12px; width:110px; font-size:13px;" aria-label="Genauigkeit">
            <option value="4" selected>4 Dez.</option>
            <option value="2">2 Dez.</option>
            <option value="0">Ganzzahl</option>
          </select>
        </div>
      </div>
    </div>

    <div class="side" aria-hidden="false">
      <div>
        <div class="section-title">Schnellvorlagen</div>
        <div class="preset-grid" id="presets">
          </div>
      </div>

      <div>
        <div class="section-title">Verlauf</div>
        <div class="history" id="history" aria-label="Verlauf">
          </div>
      </div>
    </div>
  </div>
</div>

<script>
/* -------------------------
   Vereinfachte Unit-Logik
   ------------------------- */

const categories = {
  "Länge": { base:"m", units: { "m":1, "km":1000, "cm":0.01, "mm":0.001, "mi":1609.344, "ft":0.3048, "in":0.0254 } },
  "Masse": { base:"kg", units: { "kg":1, "g":0.001, "mg":1e-6, "lb":0.45359237, "oz":0.028349523125 } },
  "Volumen": { base:"L", units: { "L":1, "mL":0.001, "m³":1000, "cup":0.24, "gal":3.785411784 } },
  "Zeit": { base:"s", units: { "s":1, "min":60, "h":3600, "d":86400 } },
  "Daten": { base:"B", units: { "B":1, "KB":1024, "MB":1024**2, "GB":1024**3 } },
  "Temperatur": { special:true, units: { "K":"K", "°C":"C", "°F":"F" } }
};

/* DOM */
const categoryEl = document.getElementById('category');
const fromEl = document.getElementById('fromUnit');
const toEl = document.getElementById('toUnit');
const valueEl = document.getElementById('value');
const clearInputBtn = document.getElementById('clearInput');
const swapBtn = document.getElementById('swap');
const resultValueEl = document.getElementById('resultValue');
const resultDetailEl = document.getElementById('resultDetail');
const precisionEl = document.getElementById('precision');
const presetsEl = document.getElementById('presets');
const historyEl = document.getElementById('history');

/* Populate category and units */
function init(){
  categoryEl.innerHTML = '';
  Object.keys(categories).forEach((k, i) => {
    const o = document.createElement('option');
    o.value = k; o.textContent = k;
    categoryEl.appendChild(o);
  });
  categoryEl.value = Object.keys(categories)[0];
  populateUnits(categoryEl.value);
  buildPresets();
  doConvert(true);
}
function populateUnits(cat){
  fromEl.innerHTML = ''; toEl.innerHTML = '';
  const c = categories[cat];
  Object.keys(c.units).forEach(u=>{
    const o1 = document.createElement('option'); o1.value = u; o1.textContent = u; fromEl.appendChild(o1);
    const o2 = o1.cloneNode(true); toEl.appendChild(o2);
  });
  fromEl.value = fromEl.options[0]?.value || '';
  toEl.value = toEl.options[1]?.value || fromEl.value;
}

/* Temperature helpers */
function tempToK(v, unit){
  if(unit === "K") return Number(v);
  if(unit === "°C") return Number(v) + 273.15;
  if(unit === "°F") return (Number(v) - 32) * 5/9 + 273.15;
  return Number(v);
}
function kToTemp(k, unit){
  if(unit === "K") return k;
  if(unit === "°C") return k - 273.15;
  if(unit === "°F") return (k - 273.15) * 9/5 + 32;
  return k;
}

/* Convert */
function convert(cat, from, to, val){
  if(categories[cat].special){
    const k = tempToK(val, from);
    return kToTemp(k, to);
  } else {
    const c = categories[cat];
    const fromF = c.units[from];
    const toF = c.units[to];
    return Number(val) * fromF / toF;
  }
}

/* Simple animate number (fade) */
function showResult(raw){
  const prec = Number(precisionEl.value);
  const formatted = Number(raw).toLocaleString('de-DE', {maximumFractionDigits:prec});
  resultValueEl.style.opacity = 0;
  setTimeout(()=> {
    resultValueEl.textContent = formatted;
    resultValueEl.style.opacity = 1;
  }, 120);
}

/* History */
let history = [];
function pushHistory(item){
  history.unshift(item);
  if(history.length > 5) history.pop(); 
  renderHistory();
}
function renderHistory(){
  historyEl.innerHTML = '';
  history.forEach(h=>{
    const d = document.createElement('div');
    d.className = 'hist-item';
    d.textContent = `${h.input} ${h.from} → ${h.output} ${h.to}`;
    d.title = `${h.input} ${h.from} → ${h.output} ${h.to} (${h.cat})`;
    d.addEventListener('click', ()=> {
      categoryEl.value = h.cat;
      populateUnits(h.cat);
      fromEl.value = h.from;
      toEl.value = h.to;
      valueEl.value = h.input;
      doConvert(true);
    });
    historyEl.appendChild(d);
  });
}

/* Presets */
const presetList = [
  {label:"km → m", cat:"Länge", from:"km", to:"m", val:1},
  {label:"kg → g", cat:"Masse", from:"kg", to:"g", val:1},
  {label:"°C → °F", cat:"Temperatur", from:"°C", to:"°F", val:20},
  {label:"GB → MB", cat:"Daten", from:"GB", to:"MB", val:1}
];
function buildPresets(){
  presetsEl.innerHTML = '';
  presetList.forEach(p=>{
    const b = document.createElement('div');
    b.className = 'preset';
    b.textContent = p.label;
    b.addEventListener('click', ()=>{
      categoryEl.value = p.cat;
      populateUnits(p.cat);
      fromEl.value = p.from;
      toEl.value = p.to;
      valueEl.value = p.val;
      doConvert(); 
    });
    presetsEl.appendChild(b);
  });
}

/* Main convert flow */
function doConvert(skipHistory){
  const cat = categoryEl.value;
  const from = fromEl.value;
  const to = toEl.value;
  const val = Number(valueEl.value);
  
  if(valueEl.value === "" || isNaN(val)){ 
      resultValueEl.textContent = '—'; 
      resultDetailEl.textContent = 'Bereit zur Eingabe'; 
      return; 
  }
  
  const raw = convert(cat, from, to, val);
  showResult(raw);
  resultDetailEl.textContent = `${val} ${from} → ${to}`;
  
  if(!skipHistory){
    pushHistory({cat, from, to, input:val, output: Number(raw).toLocaleString('de-DE', {maximumFractionDigits:Number(precisionEl.value)})});
  }
}

/* Events */
swapBtn.addEventListener('click', ()=>{
  const a = fromEl.value; fromEl.value = toEl.value; toEl.value = a;
  doConvert();
});

clearInputBtn.addEventListener('click', ()=>{
  valueEl.value = '';
  doConvert(true);
  valueEl.focus();
});

categoryEl.addEventListener('change', ()=> { populateUnits(categoryEl.value); doConvert(true); });
precisionEl.addEventListener('change', ()=> doConvert(true));

// Konvertiere während des Tippens (überspringt den Verlauf, um ihn nicht zu spammen)
valueEl.addEventListener('input', ()=> doConvert(true));

// Speichere im Verlauf, wenn das Feld verlassen wird
valueEl.addEventListener('blur', ()=> { if(valueEl.value !== "") doConvert(false) });

fromEl.addEventListener('change', ()=> doConvert());
toEl.addEventListener('change', ()=> doConvert());

/* Keyboard: Enter to log history */
valueEl.addEventListener('keydown', (e)=> { 
    if(e.key === 'Enter') {
        doConvert(false);
        valueEl.blur(); // Nimmt den Fokus weg und visualisiert die Bestätigung
    }
});

/* Initialize UI */
init();

/* Pre-fill history items */
pushHistory({cat:"Länge", from:"km", to:"m", input:1, output:"1000"});
pushHistory({cat:"Temperatur", from:"°C", to:"°F", input:20, output:"68"});
pushHistory({cat:"Daten", from:"GB", to:"MB", input:1, output:"1024"});
</script>
</body>
</html>
