<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utility Tools</title>
<style>
:root {
  --bg: #0d0714;
  --primary: #ff007f;
  --secondary: #00f0ff;
  --text: #e0e0ff;
  --glass: rgba(255,255,255,0.05);
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body {
  background: radial-gradient(at 0% 0%, #ff007f33, transparent 50%),
              radial-gradient(at 100% 0%, #00f0ff22, transparent 40%),
              var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 30px;
}
h1 { text-align: center; margin-bottom: 25px; color: var(--primary); }
.search-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-bottom: 15px;
}
.search-input {
  width: 300px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--secondary);
  background: var(--glass);
  color: white;
  outline: none;
}
.search-input:focus { box-shadow: 0 0 10px var(--secondary); }
.filter-btn {
  padding: 12px 20px;
  border-radius: 10px;
  border: 1px solid var(--primary);
  background: var(--glass);
  color: var(--primary);
  cursor: pointer;
}
.filter-btn.active {
  background: var(--primary);
  color: white;
}
.tags-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}
.tag-btn {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  background: var(--glass);
  color: var(--text);
  cursor: pointer;
}
.tag-btn.active {
  background: var(--secondary);
  color: #000;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}
.card {
  background: var(--glass);
  border-radius: 15px;
  padding: 15px;
  backdrop-filter: blur(12px);
  border: 1px solid #ffffff11;
  cursor: pointer;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 20px #ff007f55;
}
.card-image {
  height: 120px;
  border-radius: 10px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: black;
}
.card-title { font-size: 18px; font-weight: bold; }
.fav-btn {
  font-size: 22px;
  background: none;
  border: none;
  cursor: pointer;
}
.fav-btn.active { color: #ffd700; }
.card-desc { font-size: 14px; opacity: 0.7; }

/* Popup */
.popup {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.popup-controls {
  position: absolute;
  top: 20px;
  right: 30px;
  display: flex;
  gap: 20px;
  z-index: 1010;
}
.control-btn {
  font-size: 24px;
  color: white;
  background: none;
  border: none;
  cursor: pointer;
}
.close-btn { font-size: 40px; }
.popup iframe {
  width: 80%;
  height: 80%;
  border: none;
  border-radius: 12px;
  background: white;
  opacity: 0;
  transition: opacity 0.3s;
}
.no-results {
  text-align: center;
  margin-top: 20px;
  display: none;
  font-size: 18px;
}
</style>
</head>
<body>
<h1>Utility Tools</h1>

<div class="search-container">
  <input id="searchInput" class="search-input" placeholder="Search tools..." autocomplete="off">
  <button id="favFilterBtn" class="filter-btn" onclick="toggleFavFilter()">★ Favorites</button>
</div>

<div class="tags-container" id="tagsContainer"></div>

<div id="grid" class="grid"></div>

<div id="noResults" class="no-results">No tools found matching your filters.</div>

<div id="popup" class="popup">
  <div class="popup-controls">
    <button class="control-btn" onclick="openInNewTab()" title="Open in new Tab">↗</button>
    <button id="fullscreenBtn" class="control-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">🗖</button>
    <button class="control-btn close-btn" onclick="closeTool()" title="Close">&times;</button>
  </div>
  <iframe id="toolFrame" src=""></iframe>
</div>

<script>
let toolsData = [];
let favorites = JSON.parse(localStorage.getItem('utilityHubFavs')) || [];
let showFavoritesOnly = false;
let activeCategory = 'all';
let currentToolUrl = '';

async function loadTools() {
  try {
    const response = await fetch('tools.json');
    toolsData = await response.json();
    renderTags();
    renderCards();
  } catch (e) {
    console.error(e);
  }
}

function renderTags() {
  const container = document.getElementById('tagsContainer');
  container.innerHTML = `<button class="tag-btn active" onclick="setCategory('all', this)">All</button>`;
  const cats = [...new Set(toolsData.map(t => t.category))];
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    btn.onclick = () => setCategory(cat, btn);
    container.appendChild(btn);
  });
}

function renderCards(filtered = toolsData) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  filtered.forEach(tool => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', tool.id);
    card.setAttribute('data-name', tool.name);
    card.setAttribute('data-category', tool.category);
    card.onclick = () => openTool(tool.url);
    card.innerHTML = `
      <div class="card-image">${tool.imageText}</div>
      <div class="card-title">${tool.title}</div>
      <div class="card-desc">${tool.desc}</div>
    `;
    grid.appendChild(card);
  });
}

function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  const filtered = toolsData.filter(tool => {
    const matchSearch = tool.name.toLowerCase().includes(term) || tool.title.toLowerCase().includes(term);
    const matchCat = activeCategory === 'all' || tool.category === activeCategory;
    return matchSearch && matchCat;
  });
  renderCards(filtered);
}

function openTool(url) {
  currentToolUrl = url;
  document.getElementById('toolFrame').src = url;
  document.getElementById('popup').style.display = 'flex';
}

function closeTool() {
  document.getElementById('popup').style.display = 'none';
  document.getElementById('toolFrame').src = '';
}

function openInNewTab() {
  if (currentToolUrl) window.open(currentToolUrl, '_blank');
}

function toggleFullscreen() {
  const popup = document.getElementById('popup');
  if (!document.fullscreenElement) popup.requestFullscreen();
  else document.exitFullscreen();
}

// Init
loadTools();
document.getElementById('searchInput').addEventListener('input', filterCards);
</script>
</body>
</html>
