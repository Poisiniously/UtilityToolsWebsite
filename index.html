<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utility</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#ff007f;
--secondary:#00f0ff;
--bg:#0d0714;
--surface:rgba(26,12,38,.65);
--text:#f4f4ff;
--text2:#a0a0c0;
--radius:22px;
--transition:.3s cubic-bezier(.4,0,.2,1);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Outfit,sans-serif;
color:var(--text);
height:100vh;
overflow:hidden;

/* 🔥 Animated Background */
background:
radial-gradient(circle at 0% 0%, #ff007f33 0%, transparent 40%),
radial-gradient(circle at 100% 0%, #00f0ff22 0%, transparent 40%),
linear-gradient(120deg,#0d0714,#120a1f);

animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0 0,100% 0;}
100%{background-position:20% 10%,80% 20%;}
}

/* Sidebar */
.sidebar{
width:260px;
height:100%;
padding:25px;
background:rgba(20,10,30,.7);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,.05);
position:fixed;
}

.logo{
font-size:26px;
font-weight:700;
margin-bottom:40px;
background:linear-gradient(90deg,#ff007f,#00f0ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav button{
width:100%;
height:48px;
background:none;
border:none;
color:var(--text2);
text-align:left;
border-radius:14px;
padding-left:12px;
cursor:pointer;
transition:var(--transition);
}

.nav button:hover{
background:rgba(255,255,255,.05);
color:white;
}

.nav .active{
background:linear-gradient(90deg,#ff007f,#7c3aed);
color:white;
}

/* Main */
.main{
margin-left:260px;
padding:40px;
height:100%;
overflow:auto;
}

/* Search */
.search{
width:420px;
height:52px;
border-radius:999px;
border:none;
padding:0 20px;
background:rgba(255,255,255,.05);
color:white;
outline:none;
backdrop-filter:blur(12px);
transition:.3s;
}

.search:focus{
box-shadow:0 0 25px #00f0ff55;
}

/* Cards */
.cards{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
}

.card{
position:relative;
background:var(--surface);
border-radius:var(--radius);
overflow:hidden;
backdrop-filter:blur(20px);
cursor:pointer;
transition:.35s;
border:1px solid rgba(255,255,255,.05);
}

/* Glow border */
.card::before{
content:"";
position:absolute;
inset:0;
border-radius:inherit;
padding:1px;
background:linear-gradient(120deg,#ff007f,#00f0ff);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
opacity:0;
transition:.4s;
}

.card:hover::before{
opacity:1;
}

/* Hover animation */
.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:
0 20px 60px #ff007f33,
0 0 30px #00f0ff22;
}

/* Shine effect */
.card::after{
content:"";
position:absolute;
top:-100%;
left:-100%;
width:200%;
height:200%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.15),
transparent
);
transform:rotate(25deg);
opacity:0;
}

.card:hover::after{
animation:shine 1s;
}

@keyframes shine{
0%{transform:translateX(-100%) rotate(25deg);opacity:1;}
100%{transform:translateX(100%) rotate(25deg);opacity:0;}
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.content{
padding:18px;
}

.content h2{
margin-bottom:8px;
}

.content p{
color:var(--text2);
font-size:14px;
margin-bottom:15px;
}

.content button{
width:100%;
height:42px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ff007f,#7c3aed);
color:white;
cursor:pointer;
}

/* Popup */
#popup{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
}

.popup{
width:90%;
height:90%;
background:#120a1f;
border-radius:24px;
overflow:hidden;
display:flex;
flex-direction:column;
animation:pop .35s ease;
}

@keyframes pop{
from{transform:scale(.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.popupHeader{
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
background:rgba(255,255,255,.05);
}

.popupHeader button{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

iframe{
flex:1;
border:none;
background:white;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">Utility</div>

<div class="nav">
<button class="active">Dashboard</button>
<button>Favoriten</button>
<button>Tools</button>
<button>Developer</button>
<button>Image</button>
<button>Network</button>
</div>
</div>

<div class="main">

<input class="search" placeholder="🔍 Search tools...">

<div class="cards">

<div class="card" onclick="openTool('tools/calculator/index.html')">
<img src="https://picsum.photos/400/200?1">
<div class="content">
<h2>Calculator</h2>
<p>Schnelle Berechnungen.</p>
<button>Open</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?2">
<div class="content">
<h2>Password</h2>
<p>Generate secure passwords.</p>
<button>Open</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?3">
<div class="content">
<h2>QR Tool</h2>
<p>Create QR codes.</p>
<button>Open</button>
</div>
</div>

</div>

</div>

<div id="popup">
<div class="popup">
<div class="popupHeader">
<h3>Tool</h3>
<button onclick="closeTool()">✕</button>
</div>
<iframe id="frame"></iframe>
</div>
</div>

<script>

const popup = document.getElementById("popup");
const frame = document.getElementById("frame");

function openTool(path){
frame.src = path;
popup.style.display = "flex";
}

function closeTool(){
frame.src = "";
popup.style.display = "none";
}

</script>

</body>
</html>
