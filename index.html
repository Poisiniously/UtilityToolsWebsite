<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utility Hub</title>

<style>
:root {
  --bg: #0d0714;
  --primary: #ff007f;
  --secondary: #00f0ff;
  --text: #e0e0ff;
  --glass: rgba(255,255,255,0.05);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background:
    radial-gradient(at 0% 0%, #ff007f33, transparent 50%),
    radial-gradient(at 100% 0%, #00f0ff22, transparent 40%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 30px;
}

/* TITLE */
h1 {
  text-align: center;
  margin-bottom: 25px;
  color: var(--primary);
}

/* SEARCH & FILTER */
.search-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-bottom: 30px;
}

.search-input {
  width: 300px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--secondary);
  background: var(--glass);
  color: white;
  outline: none;
  transition: box-shadow 0.3s;
}

.search-input:focus {
  box-shadow: 0 0 10px var(--secondary);
}

.filter-btn {
  padding: 12px 20px;
  border-radius: 10px;
  border: 1px solid var(--primary);
  background: var(--glass);
  color: var(--primary);
  cursor: pointer;
  outline: none;
  transition: all 0.3s;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 5px;
}

.filter-btn:hover {
  background: rgba(255, 0, 127, 0.1);
}

.filter-btn.active {
  background: var(--primary);
  color: white;
  box-shadow: 0 0 15px #ff007f55;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  position: relative; /* Wichtig für das absolut positionierte Herz/Stern */
  background: var(--glass);
  border-radius: 15px;
  padding: 15px;
  backdrop-filter: blur(12px);
  border: 1px solid #ffffff11;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 20px #ff007f55;
}

/* FAVORITE BUTTON */
.fav-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 22px;
  color: rgba(255, 255, 255, 0.2);
  background: none;
  border: none;
  cursor: pointer;
  z-index: 10;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.fav-btn:hover {
  transform: scale(1.2);
  color: rgba(255, 255, 255, 0.6);
}

.fav-btn.active {
  color: #ffd700; /* Gold */
  text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
}

/* PLACEHOLDER IMAGE */
.card-image {
  height: 120px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: black;
  margin-top: 5px;
}

/* TEXT */
.card-title {
  font-size: 18px;
  margin-bottom: 5px;
}

.card-desc {
  font-size: 14px;
  opacity: 0.7;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.popup iframe {
  width: 80%;
  height: 80%;
  border: none;
  border-radius: 12px;
  background: white;
}

.close-btn {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
  transition: color 0.3s;
}

.close-btn:hover {
  color: var(--primary);
}

/* NO RESULTS */
.no-results {
  text-align: center;
  margin-top: 20px;
  display: none;
  opacity: 0.6;
  font-size: 18px;
  width: 100%;
}
</style>
</head>

<body>

<h1>Utility Hub</h1>

<div class="search-container">
  <input id="searchInput" class="search-input" placeholder="Search tools..." autocomplete="off">
  <button id="favFilterBtn" class="filter-btn" onclick="toggleFavFilter()">★ Favorites</button>
</div>

<div id="grid" class="grid">

  <!-- Calculator Card -->
  <div class="card" data-id="calc" data-name="calculator" onclick="openTool('tools/calculator/index.html')">
    <button class="fav-btn" onclick="toggleFav(event, 'calc')">★</button>
    <div class="card-image">CALC</div>
    <div class="card-title">Calculator</div>
    <div class="card-desc">Simple math calculator</div>
  </div>

  <!-- Text Cleaner Card -->
  <div class="card" data-id="text" data-name="text cleaner" onclick="openTool('tools/textcleaner/index.html')">
    <button class="fav-btn" onclick="toggleFav(event, 'text')">★</button>
    <div class="card-image">TEXT</div>
    <div class="card-title">Text Cleaner</div>
    <div class="card-desc">Simple text formatting</div>
  </div>

  <!-- Converter Card -->
  <div class="card" data-id="conv" data-name="converter file" onclick="openTool('tools/file-converter/index.html')">
    <button class="fav-btn" onclick="toggleFav(event, 'conv')">★</button>
    <div class="card-image">CONV</div>
    <div class="card-title">File Converter</div>
    <div class="card-desc">Convert files easily</div>
  </div>

  <!-- Timer Card -->
  <div class="card" data-id="timer" data-name="timer" onclick="openTool('tools/timer/index.html')">
    <button class="fav-btn" onclick="toggleFav(event, 'timer')">★</button>
    <div class="card-image">TIME</div>
    <div class="card-title">Timer</div>
    <div class="card-desc">Countdown & Stopwatch</div>
  </div>

</div>

<!-- No Results Message -->
<div id="noResults" class="no-results">
  No tools found.
</div>

<!-- Popup Container -->
<div id="popup" class="popup">
  <span class="close-btn" onclick="closeTool()">&times;</span>
  <iframe id="toolFrame" src=""></iframe>
</div>

<!-- JavaScript for Interactivity -->
<script>
  // --- Favorites System Variables ---
  let favorites = JSON.parse(localStorage.getItem('utilityHubFavs')) || [];
  let showFavoritesOnly = false;

  // --- Initialize on Load ---
  function init() {
    // Set active class on favorited cards
    document.querySelectorAll('.card').forEach(card => {
      const id = card.getAttribute('data-id');
      if (favorites.includes(id)) {
        card.querySelector('.fav-btn').classList.add('active');
      }
    });
  }

  // --- Toggle Favorite Status ---
  function toggleFav(event, id) {
    event.stopPropagation(); // Verhindert, dass sich die Karte öffnet, wenn man den Stern klickt
    const btn = event.target;
    
    if (favorites.includes(id)) {
      favorites = favorites.filter(favId => favId !== id);
      btn.classList.remove('active');
    } else {
      favorites.push(id);
      btn.classList.add('active');
    }
    
    // In LocalStorage speichern
    localStorage.setItem('utilityHubFavs', JSON.stringify(favorites));
    
    // Ansicht aktualisieren, falls der Filter gerade aktiv ist
    filterCards();
  }

  // --- Toggle Favorites Filter Button ---
  function toggleFavFilter() {
    showFavoritesOnly = !showFavoritesOnly;
    const btn = document.getElementById('favFilterBtn');
    
    if (showFavoritesOnly) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
    
    filterCards();
  }

  // --- Combined Filter Logic (Search + Favorites) ---
  function filterCards() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.querySelectorAll('.card');
    let hasVisibleCards = false;

    cards.forEach(card => {
      const toolName = card.getAttribute('data-name').toLowerCase();
      const id = card.getAttribute('data-id');
      
      const matchesSearch = toolName.includes(searchTerm);
      const matchesFav = !showFavoritesOnly || favorites.includes(id);

      if (matchesSearch && matchesFav) {
        card.style.display = 'block';
        hasVisibleCards = true;
      } else {
        card.style.display = 'none';
      }
    });

    document.getElementById('noResults').style.display = hasVisibleCards ? 'none' : 'block';
  }

  // Event Listener for Search
  document.getElementById('searchInput').addEventListener('input', filterCards);

  // --- Popup Functions ---
  function openTool(url) {
    const popup = document.getElementById('popup');
    const iframe = document.getElementById('toolFrame');
    iframe.src = url;
    popup.style.display = 'flex';
  }

  function closeTool() {
    const popup = document.getElementById('popup');
    const iframe = document.getElementById('toolFrame');
    popup.style.display = 'none';
    iframe.src = '';
  }

  document.getElementById('popup').addEventListener('click', function(e) {
    if (e.target === this) closeTool();
  });

  // Run initialization
  init();
</script>

</body>
</html>
