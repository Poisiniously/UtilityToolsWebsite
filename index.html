<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utility Tools</title>
<style>
:root {
  --bg: #0d0714;
  --primary: #ff007f;
  --secondary: #00f0ff;
  --text: #e0e0ff;
  --glass: rgba(255,255,255,0.05);
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}
body {
  background:
    radial-gradient(at 0% 0%, #ff007f33, transparent 50%),
    radial-gradient(at 100% 0%, #00f0ff22, transparent 40%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 30px;
}
/* TITLE */
h1 {
  text-align: center;
  margin-bottom: 25px;
  color: var(--primary);
}
/* SEARCH & FILTER */
.search-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-bottom: 15px;
}
.search-input {
  width: 300px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--secondary);
  background: var(--glass);
  color: white;
  outline: none;
  transition: box-shadow 0.3s;
}
.search-input:focus {
  box-shadow: 0 0 10px var(--secondary);
}
.filter-btn {
  padding: 12px 20px;
  border-radius: 10px;
  border: 1px solid var(--primary);
  background: var(--glass);
  color: var(--primary);
  cursor: pointer;
  outline: none;
  transition: all 0.3s;
  font-weight: bold;
}
.filter-btn:hover {
  background: rgba(255, 0, 127, 0.1);
}
.filter-btn.active {
  background: var(--primary);
  color: white;
  box-shadow: 0 0 15px #ff007f55;
}
/* CATEGORIES (TAGS) */
.tags-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}
.tag-btn {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  background: var(--glass);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}
.tag-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: var(--secondary);
}
.tag-btn.active {
  background: var(--secondary);
  color: #000;
  border-color: var(--secondary);
  font-weight: bold;
  box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
}
/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}
/* CARD */
.card {
  background: var(--glass);
  border-radius: 15px;
  padding: 15px;
  backdrop-filter: blur(12px);
  border: 1px solid #ffffff11;
  cursor: pointer;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 20px #ff007f55;
}
/* PLACEHOLDER IMAGE */
.card-image {
  height: 120px;
  border-radius: 10px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: black;
}
/* CARD HEADER */
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
}
.card-title {
  font-size: 18px;
  font-weight: bold;
}
/* FAVORITE BUTTON */
.fav-btn {
  font-size: 22px;
  color: rgba(255, 255, 255, 0.2);
  background: none;
  border: none;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  line-height: 1;
}
.fav-btn:hover {
  transform: scale(1.2);
  color: rgba(255, 255, 255, 0.6);
}
.fav-btn.active {
  color: #ffd700;
  text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
}
/* TEXT */
.card-desc {
  font-size: 14px;
  opacity: 0.7;
}
/* POPUP & CONTROLS */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.popup-controls {
  position: absolute;
  top: 20px;
  right: 30px;
  display: flex;
  align-items: center;
  gap: 20px;
  z-index: 1010;
}
.control-btn {
  font-size: 24px;
  color: white;
  cursor: pointer;
  background: none;
  border: none;
  outline: none;
  transition: color 0.3s, transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.control-btn:hover {
  color: var(--secondary);
  transform: scale(1.1);
}
.close-btn {
  font-size: 40px;
}
.close-btn:hover {
  color: var(--primary);
}
.popup iframe {
  width: 80%;
  height: 80%;
  border: none;
  border-radius: 12px;
  background: white;
  transition: width 0.3s, height 0.3s, border-radius 0.3s, opacity 0.3s;
  opacity: 0;
}
.popup.fullscreen-mode iframe {
  width: 100% !important;
  height: 100% !important;
  border-radius: 0px !important;
}
/* NEON LOADING SPINNER */
.spinner {
  position: absolute;
  width: 60px;
  height: 60px;
  border: 4px solid rgba(255, 0, 127, 0.1);
  border-top-color: var(--primary);
  border-bottom-color: var(--secondary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  z-index: 1005;
  transition: opacity 0.3s, visibility 0.3s;
  box-shadow: 0 0 15px var(--primary);
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
/* NO RESULTS */
.no-results {
  text-align: center;
  margin-top: 20px;
  display: none;
  opacity: 0.6;
  font-size: 18px;
  width: 100%;
}
</style>
</head>
<body>
<h1>Utility Tools</h1>

<div class="search-container">
  <input id="searchInput" class="search-input" placeholder="Search tools..." autocomplete="off">
  <button id="favFilterBtn" class="filter-btn" onclick="toggleFavFilter()">★ Favorites</button>
</div>

<div class="tags-container" id="tagsContainer"></div>

<div id="grid" class="grid"></div>

<div id="noResults" class="no-results">
  No tools found matching your filters.
</div>

<div id="popup" class="popup">
  <div class="popup-controls">
    <button class="control-btn" onclick="openInNewTab()" title="Open in new Tab">↗</button>
    <button id="fullscreenBtn" class="control-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">🗖</button>
    <button class="control-btn close-btn" onclick="closeTool()" title="Close">&times;</button>
  </div>
  <div id="popupSpinner" class="spinner"></div>
  <iframe id="toolFrame" src=""></iframe>
</div>

<script>
// ====================== DATA & STATE ======================
let toolsData = [];
let favorites = JSON.parse(localStorage.getItem('utilityHubFavs')) || [];
let showFavoritesOnly = false;
let activeCategory = 'all';
let currentToolUrl = '';

// ====================== LOAD TOOLS ======================
async function loadTools() {
  try {
    const response = await fetch('tools.json');
    if (!response.ok) throw new Error('JSON not found');
    toolsData = await response.json();
    renderTags();
    renderCards();
  } catch (err) {
    console.error("Fehler beim Laden der tools.json:", err);
    document.getElementById('grid').innerHTML = `
      <p style="color:red; text-align:center; grid-column: 1/-1;">
        Fehler: tools.json konnte nicht geladen werden.<br>
        Stelle sicher, dass die Datei im gleichen Ordner liegt.
      </p>`;
  }
}

// ====================== RENDER ======================
function renderTags() {
  const container = document.getElementById('tagsContainer');
  container.innerHTML = `<button class="tag-btn active" onclick="setCategory('all', this)">All</button>`;

  const categories = [...new Set(toolsData.map(t => t.category))];
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    btn.onclick = () => setCategory(cat, btn);
    container.appendChild(btn);
  });
}

function renderCards(filteredTools = toolsData) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  filteredTools.forEach(tool => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', tool.id);
    card.setAttribute('data-name', tool.name);
    card.setAttribute('data-category', tool.category);
    card.onclick = () => openTool(tool.url);

    card.innerHTML = `
      <div class="card-image">${tool.imageText}</div>
      <div class="card-header">
        <div class="card-title">${tool.title}</div>
        <button class="fav-btn" onclick="toggleFav(event, '${tool.id}')">★</button>
      </div>
      <div class="card-desc">${tool.desc}</div>
    `;
    grid.appendChild(card);
  });

  // Restore favorites
  document.querySelectorAll('.fav-btn').forEach(btn => {
    const id = btn.parentElement.parentElement.getAttribute('data-id');
    if (favorites.includes(id)) btn.classList.add('active');
  });
}

// ====================== FILTERS ======================
function setCategory(category, btnElement) {
  activeCategory = category;
  document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
  btnElement.classList.add('active');
  filterCards();
}

function toggleFav(event, id) {
  event.stopPropagation();
  const btn = event.target;

  if (favorites.includes(id)) {
    favorites = favorites.filter(favId => favId !== id);
    btn.classList.remove('active');
  } else {
    favorites.push(id);
    btn.classList.add('active');
  }

  localStorage.setItem('utilityHubFavs', JSON.stringify(favorites));
  filterCards();
}

function toggleFavFilter() {
  showFavoritesOnly = !showFavoritesOnly;
  document.getElementById('favFilterBtn').classList.toggle('active', showFavoritesOnly);
  filterCards();
}

function filterCards() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();

  const filtered = toolsData.filter(tool => {
    const matchesSearch = tool.name.toLowerCase().includes(searchTerm) || 
                         tool.title.toLowerCase().includes(searchTerm);
    const matchesFav = !showFavoritesOnly || favorites.includes(tool.id);
    const matchesCat = activeCategory === 'all' || activeCategory === tool.category;

    return matchesSearch && matchesFav && matchesCat;
  });

  renderCards(filtered);
  document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';
}

// ====================== POPUP ======================
function openTool(url) {
  currentToolUrl = url;
  const popup = document.getElementById('popup');
  const iframe = document.getElementById('toolFrame');
  const spinner = document.getElementById('popupSpinner');

  spinner.style.opacity = '1';
  spinner.style.visibility = 'visible';
  iframe.style.opacity = '0';

  iframe.src = url;
  popup.style.display = 'flex';
}

function onIframeLoaded() {
  const iframe = document.getElementById('toolFrame');
  const spinner = document.getElementById('popupSpinner');
  if (iframe.src && currentToolUrl !== '') {
    spinner.style.opacity = '0';
    spinner.style.visibility = 'hidden';
    iframe.style.opacity = '1';
  }
}

function openInNewTab() {
  if (currentToolUrl) {
    window.open(currentToolUrl, '_blank');
    closeTool();
  }
}

function closeTool() {
  const popup = document.getElementById('popup');
  const iframe = document.getElementById('toolFrame');

  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
  popup.classList.remove('fullscreen-mode');
  document.getElementById('fullscreenBtn').innerText = '🗖';

  popup.style.display = 'none';
  iframe.src = '';
  currentToolUrl = '';
}

function toggleFullscreen() {
  const popup = document.getElementById('popup');
  const btn = document.getElementById('fullscreenBtn');

  if (!document.fullscreenElement) {
    popup.requestFullscreen().then(() => {
      btn.innerText = '🗗';
      popup.classList.add('fullscreen-mode');
    }).catch(() => {
      popup.classList.toggle('fullscreen-mode');
      btn.innerText = popup.classList.contains('fullscreen-mode') ? '🗗' : '🗖';
    });
  } else {
    document.exitFullscreen();
  }
}

// Event Listeners
document.getElementById('searchInput').addEventListener('input', filterCards);
document.getElementById('toolFrame').addEventListener('load', onIframeLoaded);
document.getElementById('popup').addEventListener('click', function(e) {
  if (e.target === this) closeTool();
});
document.addEventListener('fullscreenchange', () => {
  const popup = document.getElementById('popup');
  const btn = document.getElementById('fullscreenBtn');
  if (!document.fullscreenElement) {
    popup.classList.remove('fullscreen-mode');
    btn.innerText = '🗖';
  }
});

// Start
loadTools();
</script>
</body>
</html>
