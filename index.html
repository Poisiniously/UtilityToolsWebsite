<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utility Hub - Dashboard</title>
<style>
:root {
  --background: #0d0714;
  --surface: rgba(26, 12, 38, 0.65);
  --primary: #ff007f;
  --secondary: #00f0ff;
  --text: #f4f4ff;
  --text-secondary: #a0a0c0;
  --border: rgba(255, 255, 255, 0.08);
  --glass-blur: blur(16px);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Outfit', 'Segoe UI', sans-serif;
}

body {
  background: 
    radial-gradient(at 0% 0%, rgba(255, 0, 127, 0.15), transparent 50%),
    radial-gradient(at 100% 0%, rgba(0, 240, 255, 0.1), transparent 40%),
    var(--background);
  color: var(--text);
  min-height: 100vh;
  padding: 40px 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  color: var(--text);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: linear-gradient(to right, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.search-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.search-input {
  width: 320px;
  padding: 14px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  outline: none;
  backdrop-filter: var(--glass-blur);
  transition: all 0.3s ease;
}

.search-input:focus {
  border-color: var(--secondary);
  box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
}

.filter-btn {
  padding: 14px 24px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  outline: none;
  backdrop-filter: var(--glass-blur);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-weight: 600;
}

.filter-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  box-shadow: 0 0 15px rgba(255, 0, 127, 0.15);
}

.filter-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
}

.tags-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.tag-btn {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  backdrop-filter: var(--glass-blur);
  transition: all 0.2s ease;
}

.tag-btn:hover {
  border-color: var(--secondary);
  color: var(--text);
}

.tag-btn.active {
  background: var(--secondary);
  color: #0d0714;
  border-color: var(--secondary);
  font-weight: 600;
  box-shadow: 0 0 15px rgba(0, 240, 255, 0.35);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 25px;
  max-width: 1200px;
  margin: 0 auto;
}

.card {
  background: var(--surface);
  border-radius: 18px;
  padding: 20px;
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: translateY(-5px);
  border-color: rgba(255, 0, 127, 0.3);
  box-shadow: 0 10px 30px rgba(255, 0, 127, 0.1);
}

.card-image {
  height: 130px;
  border-radius: 12px;
  margin-bottom: 15px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #0d0714;
  font-size: 1.1rem;
  letter-spacing: 0.5px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.card-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}

.fav-btn {
  font-size: 20px;
  color: rgba(255, 255, 255, 0.15);
  background: none;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}

.fav-btn:hover {
  transform: scale(1.2);
  color: var(--secondary);
}

.fav-btn.active {
  color: #ffd700;
  filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
}

.card-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.4;
}

.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(13, 7, 20, 0.85);
  backdrop-filter: blur(8px);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.popup-controls {
  position: absolute;
  top: 20px;
  right: 30px;
  display: flex;
  align-items: center;
  gap: 20px;
  z-index: 1010;
}

.control-btn {
  font-size: 22px;
  color: var(--text-secondary);
  cursor: pointer;
  background: none;
  border: none;
  outline: none;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.control-btn:hover {
  color: var(--secondary);
  transform: scale(1.1);
}

.close-btn {
  font-size: 36px;
}

.close-btn:hover {
  color: var(--primary);
}

.popup iframe {
  width: 85%;
  height: 85%;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--background);
  transition: all 0.3s ease;
  opacity: 0;
}

.popup.fullscreen-mode iframe {
  width: 100% !important;
  height: 100% !important;
  border-radius: 0px !important;
  border: none;
}

.spinner {
  position: absolute;
  width: 50px;
  height: 50px;
  border: 3px solid rgba(255, 0, 127, 0.1);
  border-top-color: var(--primary);
  border-bottom-color: var(--secondary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  z-index: 1005;
  transition: opacity 0.3s, visibility 0.3s;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.no-results {
  text-align: center;
  grid-column: 1 / -1;
  padding: 40px 0;
  color: var(--text-secondary);
  font-size: 16px;
  display: none;
}
</style>
</head>
<body>

<h1>Utility Hub</h1>

<div class="search-container">
  <input id="searchInput" class="search-input" placeholder="Search tools..." autocomplete="off">
  <button id="favFilterBtn" class="filter-btn">★ Favorites</button>
</div>

<div class="tags-container" id="tagsContainer"></div>

<div id="grid" class="grid">
  <div id="noResults" class="no-results">
    No tools found matching your filters.
  </div>
</div>

<div id="popup" class="popup">
  <div class="popup-controls">
    <button id="newTabBtn" class="control-btn" title="Open in new Tab">↗</button>
    <button id="fullscreenBtn" class="control-btn" title="Toggle Fullscreen">🗖</button>
    <button id="closeBtn" class="control-btn close-btn" title="Close">&times;</button>
  </div>
  <div id="popupSpinner" class="spinner"></div>
  <iframe id="toolFrame" src=""></iframe>
</div>

<script>
// ====================== DATA & STATE ======================
let toolsData = [];
let favorites = JSON.parse(localStorage.getItem('utilityHubFavs')) || [];
let showFavoritesOnly = false;
let activeCategory = 'all';
let currentToolUrl = '';

// ====================== LOAD TOOLS ======================
async function loadTools() {
  try {
    const response = await fetch('tools.json');
    if (!response.ok) throw new Error('JSON not found');
    toolsData = await response.json();
    renderTags();
    renderCards();
  } catch (err) {
    console.error("Error loading tools.json:", err);
    document.getElementById('grid').innerHTML = `
      <p style="color:var(--primary); text-align:center; grid-column: 1/-1; padding: 20px;">
        Error: Could not load tools.json<br>
        Please ensure the server file structure matches setup requirements.
      </p>`;
  }
}

// ====================== RENDER ======================
function renderTags() {
  const container = document.getElementById('tagsContainer');
  container.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'tag-btn active';
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', () => setCategory('all', allBtn));
  container.appendChild(allBtn);

  const categories = [...new Set(toolsData.map(t => t.category))];
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    btn.addEventListener('click', () => setCategory(cat, btn));
    container.appendChild(btn);
  });
}

function renderCards(filteredTools = toolsData) {
  const grid = document.getElementById('grid');
  
  // Keep the no-results element safe
  const noResultsEl = document.getElementById('noResults');
  grid.innerHTML = '';
  grid.appendChild(noResultsEl);

  if (filteredTools.length === 0) {
    noResultsEl.style.display = 'block';
    return;
  } else {
    noResultsEl.style.display = 'none';
  }

  filteredTools.forEach(tool => {
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', tool.id);

    // Dynamic Safe Content Construction
    card.innerHTML = `
      <div class="card-image"></div>
      <div class="card-header">
        <div class="card-title"></div>
        <button class="fav-btn">★</button>
      </div>
      <div class="card-desc"></div>
    `;

    // Secure Text Injections
    card.querySelector('.card-image').textContent = tool.imageText || '';
    card.querySelector('.card-title').textContent = tool.title || '';
    card.querySelector('.card-desc').textContent = tool.desc || '';

    // Click handler to open iframe frame container
    card.addEventListener('click', (e) => {
      if (!e.target.classList.contains('fav-btn')) {
        openTool(tool.url);
      }
    });

    // Favorite Button Engine setup
    const favBtn = card.querySelector('.fav-btn');
    if (favorites.includes(tool.id)) {
      favBtn.classList.add('active');
    }
    favBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFav(tool.id, favBtn);
    });

    grid.appendChild(card);
  });
}

// ====================== FILTERS & SYSTEM LOGIC ======================
function setCategory(category, btnElement) {
  activeCategory = category;
  document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
  btnElement.classList.add('active');
  filterCards();
}

function toggleFav(id, btnElement) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(favId => favId !== id);
    btnElement.classList.remove('active');
  } else {
    favorites.push(id);
    btnElement.classList.add('active');
  }
  localStorage.setItem('utilityHubFavs', JSON.stringify(favorites));
  
  // Re-run filter rules if the dashboard view relies strictly on Favorite filter toggle state
  if (showFavoritesOnly) {
    filterCards();
  }
}

function toggleFavFilter() {
  showFavoritesOnly = !showFavoritesOnly;
  document.getElementById('favFilterBtn').classList.toggle('active', showFavoritesOnly);
  filterCards();
}

function filterCards() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();

  const filtered = toolsData.filter(tool => {
    const matchesSearch = (tool.name && tool.name.toLowerCase().includes(searchTerm)) ||
                          (tool.title && tool.title.toLowerCase().includes(searchTerm));
    const matchesFav = !showFavoritesOnly || favorites.includes(tool.id);
    const matchesCat = activeCategory === 'all' || activeCategory === tool.category;
    return matchesSearch && matchesFav && matchesCat;
  });

  renderCards(filtered);
}

// ====================== WINDOW CONTROL POPUPS ======================
function openTool(url) {
  currentToolUrl = url;
  const popup = document.getElementById('popup');
  const iframe = document.getElementById('toolFrame');
  const spinner = document.getElementById('popupSpinner');

  spinner.style.opacity = '1';
  spinner.style.visibility = 'visible';
  iframe.style.opacity = '0';

  iframe.src = url;
  popup.style.display = 'flex';
}

function onIframeLoaded() {
  const iframe = document.getElementById('toolFrame');
  const spinner = document.getElementById('popupSpinner');
  if (iframe.src && currentToolUrl !== '') {
    spinner.style.opacity = '0';
    spinner.style.visibility = 'hidden';
    iframe.style.opacity = '1';
  }
}

function openInNewTab() {
  if (currentToolUrl) {
    window.open(currentToolUrl, '_blank');
    closeTool();
  }
}

function closeTool() {
  const popup = document.getElementById('popup');
  const iframe = document.getElementById('toolFrame');

  if (document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  }
  popup.classList.remove('fullscreen-mode');
  document.getElementById('fullscreenBtn').innerText = '🗖';

  popup.style.display = 'none';
  iframe.src = '';
  currentToolUrl = '';
}

function toggleFullscreen() {
  const popup = document.getElementById('popup');
  const btn = document.getElementById('fullscreenBtn');

  if (!document.fullscreenElement) {
    popup.requestFullscreen().then(() => {
      btn.innerText = '🗗';
      popup.classList.add('fullscreen-mode');
    }).catch(() => {
      popup.classList.toggle('fullscreen-mode');
      btn.innerText = popup.classList.contains('fullscreen-mode') ? '🗗' : '🗖';
    });
  } else {
    document.exitFullscreen();
  }
}

// ====================== ATTACH LIFECYCLE CONTROLS ======================
document.getElementById('searchInput').addEventListener('input', filterCards);
document.getElementById('favFilterBtn').addEventListener('click', toggleFavFilter);
document.getElementById('toolFrame').addEventListener('load', onIframeLoaded);

document.getElementById('newTabBtn').addEventListener('click', openInNewTab);
document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
document.getElementById('closeBtn').addEventListener('click', closeTool);

document.getElementById('popup').addEventListener('click', function(e) {
  if (e.target === this) closeTool();
});

document.addEventListener('fullscreenchange', () => {
  const popup = document.getElementById('popup');
  const btn = document.getElementById('fullscreenBtn');
  if (!document.fullscreenElement) {
    popup.classList.remove('fullscreen-mode');
    btn.innerText = '🗖';
  }
});

// INITIALIZE CORE APPLICATION LOADING
loadTools();
</script>
</body>
</html>
